<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>300K-400K — Minimal Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400;1,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --canvas-width:1080px;
  --canvas-height:1920px;
  --pad-top:280px;
  --pad-left:80px;
  --pad-right:180px;
  --content-max-h:960px;
  --bg:#F8F8F6;
  --text:#1A1A1A;
  --text2:#6B6B6B;
  --accent:#0057FF;
  --chip-bg:#1A1A1A;
  --chip-text:#F8F8F6;
  --safe-line:2px solid cyan;
}
html,body{width:100%;height:100%;background:#222;font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}
.toolbar{
  position:fixed;top:0;left:0;right:0;z-index:9999;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;height:48px;
  background:rgba(248,248,246,.96);border-bottom:1px solid #E0DDD8;
}
.tb-title{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;color:var(--text);text-transform:uppercase;}
.tb-controls{display:flex;align-items:center;gap:12px;}
.tbtn{
  padding:5px 14px;border:1px solid #CCC;
  background:transparent;color:var(--text2);cursor:pointer;
  border-radius:3px;font-size:11px;font-family:'DM Sans',sans-serif;
  transition:all .15s;
}
.tbtn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.slide-container{
  position:fixed;top:48px;left:50%;transform:translateX(-50%);
  width:var(--canvas-width);height:var(--canvas-height);overflow:hidden;
}
.slide{
  position:absolute;top:0;left:0;
  width:var(--canvas-width);height:var(--canvas-height);
  opacity:0;pointer-events:none;transition:opacity .35s ease;
}
.slide.active{opacity:1;pointer-events:auto;}
.slide-frame{
  width:var(--canvas-width);height:var(--canvas-height);
  position:relative;overflow:hidden;background:var(--bg);
}
.slide-frame::after{
  content:"";position:absolute;bottom:0;left:0;
  width:1080px;height:680px;
  background:transparent;pointer-events:none;z-index:200;
}

/* ── SAFE CONTENT ZONE ── */
.safe-content-zone{
  position:absolute;
  top:var(--pad-top);left:var(--pad-left);
  width:calc(var(--canvas-width) - var(--pad-left) - var(--pad-right));
  max-height:var(--content-max-h);
  display:flex;
  flex-direction:column;
  z-index:100;
}

/* ── HERO IMAGE ── */
.hero-img{
  width:100%;height:340px;overflow:hidden;border-radius:2px;
  margin-bottom:14px;flex-shrink:0;
}
.hero-img img{width:100%;height:100%;object-fit:cover;display:block;}
.hero-fallback{
  display:none;width:100%;height:100%;
  align-items:center;justify-content:center;
  background:#E8E6E2;flex-direction:column;gap:4px;
}
.hero-fallback span{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:500;color:#888;}
.hero-fallback small{font-family:'DM Mono',monospace;font-size:9px;color:#AAA;text-transform:uppercase;letter-spacing:2px;}

/* ── HEADER ── */
.rank{
  font-family:'DM Sans',sans-serif;
  font-size:20px;font-weight:700;color:var(--accent);line-height:1;margin-bottom:2px;
}
.device-name{
  font-family:'DM Sans',sans-serif;
  font-size:24px;font-weight:700;color:var(--text);line-height:1.1;margin-bottom:10px;
}

/* ── SPEC TABLE ── */
.spec-table{display:flex;flex-direction:column;margin-bottom:10px;}
.spec-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 0;border-bottom:1px solid #E0DDD8;
}
.spec-row:last-child{border-bottom:none;}
.spec-label{font-size:11px;color:var(--text2);font-weight:400;font-family:'DM Sans',sans-serif;}
.spec-value{
  font-size:11px;color:var(--text);font-weight:500;
  font-family:'DM Mono',monospace;text-align:right;max-width:55%;
}

/* ── PULL-QUOTE VERDICT ── */
.pull-quote{
  font-size:13px;font-weight:400;font-style:italic;
  color:var(--text);line-height:1.4;padding:8px 0 8px 14px;
  border-left:3px solid var(--accent);font-family:'DM Sans',sans-serif;
  margin-top:auto;
}

/* ── SWIPE TEXT ── */
.swipe-text{
  position:absolute;bottom:20px;right:20px;
  font-family:'DM Sans',sans-serif;font-size:14px;letter-spacing:4px;
  opacity:.6;color:var(--text2);z-index:150;
}

/* ── COVER ── */
.cover-slide .safe-content-zone{justify-content:center;align-items:center;text-align:center;}
.cover-hook{
  font-family:'DM Sans',sans-serif;font-size:52px;font-weight:700;
  line-height:1.05;color:var(--text);letter-spacing:-1px;max-width:90%;
}
.cover-sub{
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;
  color:var(--text2);margin-top:16px;letter-spacing:3px;text-transform:uppercase;
}
.cover-line{width:60px;height:3px;background:var(--accent);margin:18px auto 0;}

/* ── CLOSING ── */
.closing-slide .safe-content-zone{justify-content:center;align-items:center;text-align:center;}
.closing-text{
  font-family:'DM Sans',sans-serif;font-size:44px;font-weight:700;
  line-height:1.05;color:var(--text);letter-spacing:-1px;
}
.closing-sub{
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;
  color:var(--text2);margin-top:16px;letter-spacing:3px;text-transform:uppercase;
}

/* ── SAFE ZONE OVERLAY (sharp cyan lines only) ── */
.sz-overlay{display:none;position:absolute;inset:0;pointer-events:none;z-index:300;}
.sz-overlay.on{display:block;}
.sz-overlay::before{
  content:"";position:absolute;top:var(--pad-top);left:var(--pad-left);
  width:calc(var(--canvas-width) - var(--pad-left) - var(--pad-right));
  height:var(--content-max-h);border:2px solid cyan;pointer-events:none;
}

/* ── NAV ── */
.nav{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:20px;z-index:9999;
}
.nav-btn{
  width:40px;height:40px;border:1px solid #CCC;
  background:rgba(248,248,246,.95);color:var(--text);cursor:pointer;
  border-radius:50%;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.nav-counter{
  font-family:'DM Mono',monospace;font-size:13px;color:var(--text2);
  min-width:56px;text-align:center;
}
</style>
</head>
<body>

<div class="toolbar">
  <div class="tb-title">MINIMAL EDITION</div>
  <div class="tb-controls">
    <button class="tbtn" id="safeToggle">SAFE ZONE</button>
    <button class="tbtn" id="exportBtn">EXPORT PNG</button>
  </div>
</div>

<div class="slide-container" id="slideContainer"></div>

<div class="nav">
  <button class="nav-btn" id="prevBtn">&larr;</button>
  <span class="nav-counter" id="navCounter">1 / 20</span>
  <button class="nav-btn" id="nextBtn">&rarr;</button>
</div>

<script>
const IMG_BASE='https://raw.githubusercontent.com/Bigdrops/Bigdrops-carousel/main/Phones/Three-400k/';

const phones=[
  {name:'Xiaomi 14',img:'mi14.jpg',rows:[
    ['Release','Oct 2023'],['Chip','Snapdragon 8 Gen 3'],['Display','6.36" LTPO AMOLED 120Hz'],['Gaming','PUBGM 120fps · CODM 120fps'],['Camera','4K Selfie Leica'],['Storage','16GB/1TB UFS 4.0'],['Battery','4,610mAh · 90W'],['Software','Up to Android 19']
  ],verdict:'Best chip. Best charging. Best selfie. End of list.'},
  {name:'Redmi Turbo 4 Pro',img:'turbo4pro.jpg',rows:[
    ['Release','2025'],['Chip','Snapdragon 8s Gen 3'],['Display','6.67" AMOLED 144Hz'],['Gaming','PUBGM 120fps · CODM 120fps'],['Camera','50MP OIS Main'],['Storage','16GB/512GB UFS 4.0'],['Battery','6,000mAh · 90W'],['Software','Up to Android 18']
  ],verdict:'6,000mAh beast. Flat screen. Weak camera. Know why you\'re buying.'},
  {name:'Vivo X100',img:'vivox100.jpg',rows:[
    ['Release','Nov 2023'],['Chip','Dimensity 9300'],['Display','6.78" AMOLED 120Hz'],['Gaming','PUBGM 120fps · CODM 120fps'],['Camera','Zeiss Periscope 5x'],['Storage','16GB/1TB UFS 4.0'],['Battery','5,000mAh · 120W'],['Software','Up to Android 17']
  ],verdict:'All-big-core chip. Zeiss 5x zoom. 1080p selfie. One tradeoff.'},
  {name:'Honor Magic 5 Pro',img:'magic5pro.jpg',rows:[
    ['Release','Feb 2023'],['Chip','Snapdragon 8 Gen 2'],['Display','6.81" LTPO OLED 120Hz'],['Gaming','PUBGM 120fps · CODM High'],['Camera','4K Selfie PWM Safe'],['Storage','16GB/512GB UFS 4.0'],['Battery','5,100mAh · 66W'],['Software','Up to Android 17']
  ],verdict:'Most underrated. 4K selfie. Dual eSIM. PWM safe. No one talks about it.'},
  {name:'Xiaomi 13 Pro',img:'mi13pro.jpg',rows:[
    ['Release','Dec 2022'],['Chip','Snapdragon 8 Gen 2'],['Display','6.73" LTPO AMOLED 120Hz'],['Gaming','PUBGM 120fps · CODM 120fps'],['Camera','1-inch IMX989 Leica'],['Storage','12GB/512GB UFS 4.0'],['Battery','4,820mAh · 120W'],['Software','End of cycle']
  ],verdict:'1-inch Leica. SD 8 Gen 2. 120W. 1080p selfie. You win some, you lose some.'},
  {name:'OnePlus 11',img:'oneplus11.jpg',rows:[
    ['Release','Jan 2023'],['Chip','Snapdragon 8 Gen 2'],['Display','6.7" LTPO AMOLED 120Hz'],['Gaming','PUBGM 90fps · CODM 120fps'],['Camera','Hasselblad Tuned'],['Storage','16GB/512GB UFS 4.0'],['Battery','5,000mAh · 100W'],['Software','Up to Android 17']
  ],verdict:'No bloat. 100W charging. Solid camera. Reliable daily driver.'},
  {name:'Samsung Galaxy S23',img:'s23.jpg',rows:[
    ['Release','Feb 2023'],['Chip','SD 8 Gen 2 Galaxy'],['Display','6.1" AMOLED 120Hz'],['Gaming','PUBGM 120fps · CODM 120fps'],['Camera','50MP Triple'],['Storage','8GB/512GB UFS 4.0'],['Battery','3,900mAh · 25W'],['Software','Up to Android 18']
  ],verdict:'Best compact. 4 years updates. 25W charging. Powerbank mandatory.'},
  {name:'Vivo X90 Pro',img:'vivox90pro.jpg',rows:[
    ['Release','Nov 2022'],['Chip','Dimensity 9200'],['Display','6.78" AMOLED 120Hz'],['Gaming','PUBGM 90fps · CODM 120fps'],['Camera','1-inch IMX989 Zeiss V2'],['Storage','16GB/512GB UFS 4.0'],['Battery','4,870mAh · 120W'],['Software','End of cycle']
  ],verdict:'1-inch sensor. V2 chip. Best night photography. Average selfie.'},
  {name:'Xiaomi 13',img:'mi13.jpg',rows:[
    ['Release','Dec 2022'],['Chip','Snapdragon 8 Gen 2'],['Display','6.36" AMOLED 120Hz'],['Gaming','PUBGM 120fps · CODM 120fps'],['Camera','Leica 54MP'],['Storage','12GB/512GB UFS 4.0'],['Battery','4,500mAh · 67W'],['Software','End of cycle']
  ],verdict:'SD 8 Gen 2. Flat. Compact. Solid everywhere, great nowhere.'},
  {name:'Google Pixel 8',img:'pixel8.jpg',rows:[
    ['Release','Oct 2023'],['Chip','Tensor G3'],['Display','6.2" OLED 120Hz'],['Gaming','PUBGM Smooth · CODM High'],['Camera','Best Selfie'],['Storage','8GB/256GB UFS 3.1'],['Battery','4,575mAh · 27W'],['Software','Up to Android 22']
  ],verdict:'7 year updates. Best selfie. 27W torture. Long-term value.'},
  {name:'iQOO Neo 9',img:'iqooneo9.jpg',rows:[
    ['Release','Dec 2023'],['Chip','Snapdragon 8 Gen 2'],['Display','6.78" AMOLED 144Hz'],['Gaming','PUBGM 120fps · CODM 120fps'],['Camera','Average Rear'],['Storage','16GB/512GB UFS 4.0'],['Battery','5,160mAh · 120W'],['Software','Up to Android 17']
  ],verdict:'120W charging. SD 8 Gen 2. CN ROM. For gamers only.'},
  {name:'Redmi K70',img:'redmik70.jpg',rows:[
    ['Release','Dec 2023'],['Chip','Snapdragon 8 Gen 2'],['Display','6.67" AMOLED 144Hz'],['Gaming','PUBGM 90fps · CODM 120fps'],['Camera','Average'],['Storage','16GB/1TB UFS 4.0'],['Battery','5,000mAh · 90W'],['Software','Up to Android 17']
  ],verdict:'SD 8 Gen 2. GG Victus. CN ROM. Best performance per naira.'},
  {name:'Oppo Find X6',img:'findx6.jpg',rows:[
    ['Release','Mar 2023'],['Chip','Dimensity 9200'],['Display','6.74" LTPO AMOLED 120Hz'],['Gaming','PUBGM 90fps · CODM High'],['Camera','Hasselblad Tuned'],['Storage','16GB/1TB UFS 4.0'],['Battery','5,000mAh · 80W'],['Software','End of cycle']
  ],verdict:'Hasselblad camera. Outpriced by competitors. CN ROM.'},
  {name:'Redmi K60 Pro',img:'redmik60pro.jpg',rows:[
    ['Release','Jan 2023'],['Chip','Snapdragon 8 Gen 2'],['Display','6.67" AMOLED 120Hz'],['Gaming','PUBGM 90fps · CODM 120fps'],['Camera','Average'],['Storage','16GB/512GB UFS 4.0'],['Battery','5,500mAh · 67W'],['Software','End of cycle']
  ],verdict:'5,500mAh. Older. Slower. K70 wins.'},
  {name:'Xiaomi 12S Ultra',img:'mi12sultra.jpg',rows:[
    ['Release','Jul 2022'],['Chip','Snapdragon 8+ Gen 1'],['Display','6.73" LTPO AMOLED 120Hz'],['Gaming','PUBGM 90fps · CODM High'],['Camera','1-inch IMX989 Leica'],['Storage','16GB/1TB UFS 4.0'],['Battery','4,860mAh · 67W'],['Software','End of cycle']
  ],verdict:'Legendary camera. Dated chip. Buy for photos only.'},
  {name:'Xiaomi 14T',img:'mi14t.jpg',rows:[
    ['Release','Sep 2024'],['Chip','Dimensity 8300-Ultra'],['Display','6.67" AMOLED 144Hz'],['Gaming','PUBGM 90fps · CODM High'],['Camera','4K Selfie Leica'],['Storage','12GB/512GB UFS 4.0'],['Battery','5,000mAh · 67W'],['Software','Up to Android 18']
  ],verdict:'4K selfie. Mid chip. Flagship price. Makes you think.'},
  {name:'ROG 6D Ultimate',img:'rog6dultimate.jpg',rows:[
    ['Release','Sep 2022'],['Chip','Dimensity 9000+'],['Display','6.78" AMOLED 165Hz'],['Gaming','PUBGM 120fps · CODM 120fps'],['Camera','Basic'],['Storage','18GB/512GB UFS 3.1'],['Battery','6,000mAh · 65W'],['Software','End of cycle']
  ],verdict:'165Hz. 18GB RAM. Air triggers. Not a daily driver.'},
  {name:'ROG Phone 6D',img:'rog6d.jpg',rows:[
    ['Release','Sep 2022'],['Chip','Dimensity 9000+'],['Display','6.78" AMOLED 165Hz'],['Gaming','PUBGM 120fps · CODM 120fps'],['Camera','Basic'],['Storage','12GB/256GB UFS 3.1'],['Battery','6,000mAh · 65W'],['Software','End of cycle']
  ],verdict:'Less RAM. Weaker cooling. Same chip. Ultimate is better.'}
];

function buildSlides(){
  const c=document.getElementById('slideContainer');
  let h='';

  // Slide 1: Cover
  h+=`<div class="slide" data-i="0"><div class="slide-frame cover-slide"><div class="safe-content-zone"><div class="cover-hook">Stop scrolling. Start comparing.</div><div class="cover-sub">18 phones ranked · 300K–400K</div><div class="cover-line"></div><div class="swipe-text">SWIPE</div></div><div class="sz-overlay" id="sz0"></div></div></div>`;

  // Slides 2-19: Phones
  phones.forEach((p,i)=>{
    const r=i+1;
    h+=`<div class="slide" data-i="${r}"><div class="slide-frame"><div class="safe-content-zone"><div class="hero-img"><img src="${IMG_BASE}${p.img}" alt="${p.name}" crossorigin="anonymous" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div class="hero-fallback"><span>${p.name}</span><small>MISSING ASSET</small></div></div><div class="rank">#${r}</div><div class="device-name">${p.name}</div><div class="spec-table">${p.rows.map(rr=>'<div class="spec-row"><span class="spec-label">'+rr[0]+'</span><span class="spec-value">'+rr[1]+'</span></div>').join('')}</div><div class="pull-quote">${p.verdict}</div><div class="swipe-text">SWIPE</div></div><div class="sz-overlay" id="sz${r}"></div></div></div>`;
  });

  // Slide 20: Closing
  h+=`<div class="slide" data-i="19"><div class="slide-frame closing-slide"><div class="safe-content-zone"><div class="closing-text">Numbers don&rsquo;t lie. You do.</div><div class="closing-sub">BIGDROPS · 300K–400K MINIMAL</div><div class="swipe-text">SWIPE</div></div><div class="sz-overlay" id="sz20"></div></div></div>`;

  c.innerHTML=h;
}

let cur=0;
function goTo(n){
  const slides=document.querySelectorAll('.slide');
  slides.forEach(s=>s.classList.remove('active'));
  cur=Math.max(0,Math.min(n,slides.length-1));
  slides[cur].classList.add('active');
  document.getElementById('navCounter').textContent=(cur+1)+' / '+slides.length;
}

let safeOn=false;
document.addEventListener('DOMContentLoaded',()=>{
  buildSlides();
  goTo(0);

  document.getElementById('prevBtn').addEventListener('click',()=>goTo(cur-1));
  document.getElementById('nextBtn').addEventListener('click',()=>goTo(cur+1));
  document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')goTo(cur-1);if(e.key==='ArrowRight')goTo(cur+1);});

  document.getElementById('safeToggle').addEventListener('click',function(){
    safeOn=!safeOn;
    this.classList.toggle('active');
    document.querySelectorAll('.sz-overlay').forEach(el=>el.classList.toggle('on',safeOn));
  });
  document.getElementById('exportBtn').addEventListener('click',function(){
    var slide=document.querySelector('.slide.active .slide-frame');
    if(typeof html2canvas!=='undefined'){
      html2canvas(slide,{backgroundColor:'#F8F8F6',scale:2,useCORS:true}).then(function(c){
        var a=document.createElement('a');a.download='minimal-slide-'+(cur+1)+'.png';a.href=c.toDataURL();a.click();
      });
    }
  });
});
</script>
</body>
</html>
