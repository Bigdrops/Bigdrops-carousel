<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Vivid Edition - 300K to 400K</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --canvas-width: 1080px;
  --canvas-height: 1920px;
  --pad-top: 280px;
  --pad-left: 80px;
  --pad-right: 180px;
  --content-max-h: 960px;
  --content-w: calc(1080px - 80px - 180px);
  --accent: #FF3366;
  --accent2: #00E5FF;
  --text-primary: #FFFFFF;
  --text-secondary: #C0B8D0;
  --chip-bg: rgba(255,51,102,0.15);
  --chip-border: rgba(255,51,102,0.4);
}
body {
  background: #0d0d0d;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: 'DM Sans', sans-serif;
  overflow-x: hidden;
}
#toolbar {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(0,0,0,0.85);
  padding: 10px 20px;
  border-radius: 40px;
  border: 1px solid rgba(255,255,255,0.1);
}
#toolbar button {
  background: none;
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 6px 16px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
}
#toolbar button:hover {
  border-color: var(--accent);
  color: var(--accent);
}
#toolbar .counter {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  min-width: 50px;
  text-align: center;
}
#toolbar .btn-active {
  border-color: var(--accent2);
  color: var(--accent2);
}
#slides-container {
  position: relative;
  width: 1080px;
  height: 1920px;
}
.slide-frame {
  width: 1080px;
  height: 1920px;
  position: absolute;
  top: 0;
  left: 0;
  overflow: hidden;
  display: none;
}
.slide-frame.active { display: block; }
.slide-bg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #1A0533, #0A1628);
  background-size: 200% 200%;
  animation: gradientShift 12s ease infinite;
  z-index: 0;
}
@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.safe-content-zone {
  position: absolute;
  top: var(--pad-top);
  left: var(--pad-left);
  width: var(--content-w);
  max-height: var(--content-max-h);
  z-index: 10;
  display: flex;
  flex-direction: column;
}
.slide-frame::after {
  content: "";
  position: absolute;
  bottom: 0;
  left: 0;
  width: 1080px;
  height: 680px;
  background: transparent;
  pointer-events: none;
  z-index: 200;
}
/* SWIPE text */
.swipe-text {
  position: absolute;
  bottom: 20px;
  right: 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--accent2);
  opacity: 0.6;
  animation: pulseGlow 2s ease-in-out infinite;
  z-index: 20;
}
@keyframes pulseGlow {
  0%, 100% { opacity: 0.6; text-shadow: 0 0 5px rgba(0,229,255,0.3); }
  50% { opacity: 1; text-shadow: 0 0 15px rgba(0,229,255,0.8), 0 0 30px rgba(0,229,255,0.4); }
}
/* Safe zone guides */
#safeGuides {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 150;
  pointer-events: none;
  display: none;
}
#safeGuides.show { display: block; }
.guide-line {
  position: absolute;
  background: none;
  z-index: 150;
}
.guide-top {
  top: 280px;
  left: 0;
  width: 1080px;
  height: 2px;
  background: #00E5FF;
  box-shadow: 0 0 4px #00E5FF;
}
.guide-bottom {
  top: 1240px;
  left: 0;
  width: 1080px;
  height: 2px;
  background: #00E5FF;
  box-shadow: 0 0 4px #00E5FF;
}
.guide-left {
  top: 0;
  left: 80px;
  width: 2px;
  height: 1920px;
  background: #00E5FF;
  box-shadow: 0 0 4px #00E5FF;
}
.guide-right {
  top: 0;
  left: 900px;
  width: 2px;
  height: 1920px;
  background: #00E5FF;
  box-shadow: 0 0 4px #00E5FF;
}
/* ========== COVER SLIDE ========== */
.cover-content {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100%;
}
.cover-label {
  font-family: 'DM Mono', monospace;
  font-size: 16px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--accent2);
  margin-bottom: 24px;
}
.cover-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 120px;
  line-height: 1;
  color: var(--text-primary);
  letter-spacing: 2px;
}
.cover-title span {
  color: var(--accent);
  text-shadow: 0 0 30px rgba(255,51,102,0.5);
}
.cover-subtitle {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 64px;
  line-height: 1;
  color: var(--accent2);
  margin-top: 16px;
  text-shadow: 0 0 20px rgba(0,229,255,0.4);
}
.cover-meta {
  font-family: 'DM Sans', sans-serif;
  font-size: 18px;
  color: var(--text-secondary);
  margin-top: 48px;
  letter-spacing: 2px;
}
.cover-divider {
  width: 80px;
  height: 3px;
  background: var(--accent);
  margin-top: 32px;
  box-shadow: 0 0 10px rgba(255,51,102,0.6);
}
/* ========== PHONE SLIDES ========== */
.phone-slide-inner {
  display: flex;
  flex-direction: column;
  height: 100%;
  gap: 8px;
}
.phone-rank {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 80px;
  line-height: 1;
  color: var(--accent);
  text-shadow: 0 0 20px rgba(255,51,102,0.5), 0 0 40px rgba(255,51,102,0.3);
  letter-spacing: 1px;
}
.phone-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 44px;
  line-height: 1.1;
  color: var(--text-primary);
  letter-spacing: 1px;
  margin-top: 2px;
}
.phone-meta {
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: var(--text-secondary);
  margin-top: 8px;
  line-height: 1.4;
}
.phone-divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, rgba(0,229,255,0.5), transparent);
  margin: 6px 0;
}
.chips-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 6px;
}
.chip {
  background: var(--chip-bg);
  border: 1px solid var(--chip-border);
  border-radius: 6px;
  padding: 4px 12px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: #FFFFFF;
  letter-spacing: 0.5px;
}
.phone-spec {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-top: 6px;
}
.phone-software {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--accent2);
  opacity: 0.7;
  margin-top: 4px;
}
.phone-verdict {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  line-height: 1.2;
  color: var(--text-primary);
  margin-top: auto;
  padding-top: 8px;
}
.phone-verdict span {
  color: var(--accent);
  text-shadow: 0 0 10px rgba(255,51,102,0.4);
}
/* ========== CLOSING SLIDE ========== */
.closing-content {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: 100%;
}
.closing-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 100px;
  line-height: 1;
  color: var(--text-primary);
  letter-spacing: 2px;
}
.closing-accent {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 72px;
  color: var(--accent);
  text-shadow: 0 0 30px rgba(255,51,102,0.5);
  margin-top: 8px;
}
.closing-line {
  width: 120px;
  height: 3px;
  background: var(--accent2);
  margin-top: 32px;
  box-shadow: 0 0 10px rgba(0,229,255,0.5);
}
.closing-footer {
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  color: var(--text-secondary);
  margin-top: 40px;
  letter-spacing: 3px;
}
</style>
</head>
<body>

<div id="toolbar">
  <button id="prevBtn">&#9664;</button>
  <span class="counter" id="slideCounter">1 / 20</span>
  <button id="nextBtn">&#9654;</button>
  <button id="safeToggle">Safe Zone</button>
  <button id="exportBtn">Export PNG</button>
</div>

<div id="slides-container">
  <div id="safeGuides">
    <div class="guide-line guide-top"></div>
    <div class="guide-line guide-bottom"></div>
    <div class="guide-line guide-left"></div>
    <div class="guide-line guide-right"></div>
  </div>

  <!-- SLIDE 1: COVER -->
  <div class="slide-frame active" data-slide="1">
    <div class="slide-bg"></div>
    <div class="safe-content-zone">
      <div class="cover-content">
        <div class="cover-label">Tier Breakdown</div>
        <div class="cover-title"><span>N300K</span> TO <span>N400K</span></div>
        <div class="cover-subtitle">LET'S FIGHT.</div>
        <div class="cover-divider"></div>
        <div class="cover-meta">18 PHONES &middot; 1 WINNER</div>
      </div>
      <div class="swipe-text">SWIPE</div>
    </div>
  </div>

  <!-- SLIDES 2-19: PHONE SLIDES (JS generated) -->
  <div id="phoneSlidesContainer"></div>

  <!-- SLIDE 20: CLOSING -->
  <div class="slide-frame" data-slide="20">
    <div class="slide-bg"></div>
    <div class="safe-content-zone">
      <div class="closing-content">
        <div class="closing-title">LOCK IN YOUR WINNER</div>
        <div class="closing-accent">NOW.</div>
        <div class="closing-line"></div>
        <div class="closing-footer">FINAL VERDICT BELOW</div>
      </div>
      <div class="swipe-text">SWIPE</div>
    </div>
  </div>
</div>

<script>
const phones = [
  { rank:1, name:'Xiaomi 14', meta:'Oct 2023 · Leica · Curved · GG Victus 2', chips:['SD 8 Gen 3','6.36" LTPO 120Hz','PUBGM/CODM 120fps','4K Selfie Leica'], spec:'4,610mAh · 90W — Gen 3 efficiency makes this battery last longer than the number suggests.', software:'Supported up to Android 19', verdict:'Leica plus 4K selfie. This phone is CRIMINAL.' },
  { rank:2, name:'Redmi Turbo 4 Pro', meta:'2025 · Flat Screen · GG Victus', chips:['SD 8s Gen 3','6.67" AMOLED 144Hz','PUBGM/CODM 120fps','50MP OIS'], spec:'6,000mAh · 90W — Biggest battery on this entire list.', software:'Supported up to Android 18', verdict:'6,000mAh battery that won\'t quit.' },
  { rank:3, name:'Vivo X100', meta:'Nov 2023 · Zeiss · Curved · GG Victus', chips:['Dimensity 9300','6.78" AMOLED 120Hz','PUBGM/CODM 120fps','Zeiss Periscope 5x'], spec:'5,000mAh · 120W', software:'Supported up to Android 17', verdict:'Zeiss zoom hits different. That selfie though.' },
  { rank:4, name:'Honor Magic 5 Pro', meta:'Feb 2023 · Curved · GG Victus', chips:['SD 8 Gen 2','6.81" LTPO OLED 120Hz','PUBGM 120fps','Dual eSIM 4K Selfie'], spec:'5,100mAh · 66W', software:'Supported up to Android 17', verdict:'Sleeping giant. 4K selfie. Dual eSIM. Nobody is talking about it.' },
  { rank:5, name:'Xiaomi 13 Pro', meta:'Dec 2022 · Leica · Curved · GG Victus', chips:['SD 8 Gen 2','6.73" LTPO 120Hz','PUBGM/CODM 120fps','1" IMX989 Leica'], spec:'4,820mAh · 120W', software:'End of the cycle', verdict:'1-inch sensor ABSOLUTELY humbles the competition.' },
  { rank:6, name:'OnePlus 11', meta:'Jan 2023 · 2.5D Glass · Hasselblad', chips:['SD 8 Gen 2','6.7" LTPO 120Hz','CODM 120fps','Hasselblad Tuned'], spec:'5,000mAh · 100W', software:'Supported up to Android 17', verdict:'100W charging. Clean software. Zero drama.' },
  { rank:7, name:'Samsung Galaxy S23', meta:'Feb 2023 · Flat · GG Victus 2', chips:['SD 8 Gen 2 Galaxy','6.1" AMOLED 120Hz','PUBGM/CODM 120fps','eSIM'], spec:'3,900mAh · 25W', software:'Supported up to Android 18', verdict:'Tiny phone. Tiny battery. Huge regret without a powerbank.' },
  { rank:8, name:'Vivo X90 Pro', meta:'Nov 2022 · Zeiss · Curved · GG Victus', chips:['Dimensity 9200','6.78" AMOLED 120Hz','CODM 120fps','1" IMX989 Zeiss V2'], spec:'4,870mAh · 120W', software:'End of the cycle', verdict:'Night mode is basically cheating with that V2 chip.' },
  { rank:9, name:'Xiaomi 13', meta:'Dec 2022 · Leica · Flat · GG 5', chips:['SD 8 Gen 2','6.36" AMOLED 120Hz','PUBGM/CODM 120fps','Leica 54MP'], spec:'4,500mAh · 67W', software:'End of the cycle', verdict:'Flat screen. Compact. No nonsense. A quiet winner.' },
  { rank:10, name:'Google Pixel 8', meta:'Oct 2023 · Flat · GG Victus · 7 Yrs Updates', chips:['Tensor G3','6.2" OLED 120Hz','eSIM','27W Charging'], spec:'4,575mAh · 27W', software:'Supported up to Android 22', verdict:'7 years of updates. Best selfie. 27W torture. Pick your poison.' },
  { rank:11, name:'iQOO Neo 9', meta:'Dec 2023 · CN ROM · Flat Screen', chips:['SD 8 Gen 2','6.78" AMOLED 144Hz','PUBGM/CODM 120fps','120W'], spec:'5,160mAh · 120W', software:'Supported up to Android 17', verdict:'120W charging hits different. Game on.' },
  { rank:12, name:'Redmi K70', meta:'Dec 2023 · CN ROM · Flat · GG Victus', chips:['SD 8 Gen 2','6.67" AMOLED 144Hz','CODM 120fps','GG Victus'], spec:'5,000mAh · 90W', software:'Supported up to Android 17', verdict:'Flagship killer is BACK. GG Victus takes beatings.' },
  { rank:13, name:'Oppo Find X6', meta:'Mar 2023 · CN ROM · Curved · Hasselblad', chips:['Dimensity 9200','6.74" LTPO 120Hz','Hasselblad','80W'], spec:'5,000mAh · 80W', software:'End of the cycle', verdict:'Hasselblad colors POP. Price doesn\'t compete.' },
  { rank:14, name:'Redmi K60 Pro', meta:'Jan 2023 · CN ROM · Flat Screen', chips:['SD 8 Gen 2','6.67" AMOLED 120Hz','5500mAh','67W'], spec:'5,500mAh · 67W', software:'End of the cycle', verdict:'Big battery. Old news. K70 stole its spotlight.' },
  { rank:15, name:'Xiaomi 12S Ultra', meta:'Jul 2022 · CN ROM · Leica · Curved · GG Victus', chips:['SD 8+ Gen 1','6.73" LTPO 120Hz','1" IMX989 Leica','67W'], spec:'4,860mAh · 67W', software:'End of the cycle', verdict:'1-inch Leica. Still dominating. But the chip is showing its age.' },
  { rank:16, name:'Xiaomi 14T', meta:'Sep 2024 · Flat Screen · Leica', chips:['Dim 8300-Ultra','6.67" AMOLED 144Hz','Dual eSIM','4K Selfie Leica'], spec:'5,000mAh · 67W', software:'Supported up to Android 18', verdict:'4K selfie is elite. The chip is questionable at this price.' },
  { rank:17, name:'ROG 6D Ultimate', meta:'Sep 2022 · Gaming · Flat · GG Victus', chips:['Dimensity 9000+','6.78" AMOLED 165Hz','PUBGM/CODM 120fps','18GB RAM'], spec:'6,000mAh · 65W', software:'End of the cycle', verdict:'165Hz AIR TRIGGERS 18GB RAM. This is a weapon.' },
  { rank:18, name:'ROG Phone 6D', meta:'Sep 2022 · Gaming · Flat · GG Victus', chips:['Dimensity 9000+','6.78" AMOLED 165Hz','PUBGM/CODM 120fps','12GB RAM'], spec:'6,000mAh · 65W', software:'End of the cycle', verdict:'Less RAM. Weaker cooling. Same price. Get the Ultimate.' }
];

const container = document.getElementById('phoneSlidesContainer');
phones.forEach(function(p) {
  const slide = document.createElement('div');
  slide.className = 'slide-frame';
  slide.dataset.slide = p.rank + 1;

  const bg = document.createElement('div');
  bg.className = 'slide-bg';

  const safe = document.createElement('div');
  safe.className = 'safe-content-zone';

  safe.innerHTML =
    '<div class="phone-slide-inner">' +
    '<div class="phone-rank">#' + p.rank + '</div>' +
    '<div class="phone-name">' + p.name + '</div>' +
    '<div class="phone-meta">' + p.meta + '</div>' +
    '<div class="phone-divider"></div>' +
    '<div class="chips-row">' + p.chips.map(function(c) { return '<span class="chip">' + c + '</span>'; }).join('') + '</div>' +
    '<div class="phone-spec">' + p.spec + '</div>' +
    '<div class="phone-software">' + p.software + '</div>' +
    '<div class="phone-verdict"><span>' + p.verdict + '</span></div>' +
    '</div>';

  const swipe = document.createElement('div');
  swipe.className = 'swipe-text';
  swipe.textContent = 'SWIPE';

  slide.appendChild(bg);
  slide.appendChild(safe);
  safe.appendChild(swipe);
  container.appendChild(slide);
});

// Navigation
let currentSlide = 1;
const total = 20;
const slides = document.querySelectorAll('.slide-frame');
const counter = document.getElementById('slideCounter');

function showSlide(n) {
  if (n < 1) n = 1;
  if (n > total) n = total;
  currentSlide = n;
  slides.forEach(function(s) { s.classList.remove('active'); });
  slides[currentSlide - 1].classList.add('active');
  counter.textContent = currentSlide + ' / ' + total;
}

document.getElementById('prevBtn').addEventListener('click', function() { showSlide(currentSlide - 1); });
document.getElementById('nextBtn').addEventListener('click', function() { showSlide(currentSlide + 1); });
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') showSlide(currentSlide - 1);
  if (e.key === 'ArrowRight') showSlide(currentSlide + 1);
});

// Safe zone toggle
const safeToggle = document.getElementById('safeToggle');
const safeGuides = document.getElementById('safeGuides');
safeToggle.addEventListener('click', function() {
  safeGuides.classList.toggle('show');
  safeToggle.classList.toggle('btn-active');
});

// Export
document.getElementById('exportBtn').addEventListener('click', function() {
  var slide = slides[currentSlide - 1];
  if (typeof html2canvas !== 'undefined') {
    html2canvas(slide, { backgroundColor: '#1A0533', scale: 2, useCORS: true }).then(function(canvas) {
      var link = document.createElement('a');
      link.download = 'vivid-slide-' + currentSlide + '.png';
      link.href = canvas.toDataURL();
      link.click();
    });
  }
});

// Touch / swipe support
(function() {
  var startX = 0;
  document.addEventListener('touchstart', function(e) {
    startX = e.changedTouches[0].screenX;
  });
  document.addEventListener('touchend', function(e) {
    var diff = e.changedTouches[0].screenX - startX;
    if (Math.abs(diff) > 50) {
      if (diff < 0) showSlide(currentSlide + 1);
      else showSlide(currentSlide - 1);
    }
  });
})();
</script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</body>
</html>
