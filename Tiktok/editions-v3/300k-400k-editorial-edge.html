<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>300K-400K — Editorial Edge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400;1,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --canvas-width:1080px;
  --canvas-height:1920px;
  --pad-top:280px;
  --pad-left:80px;
  --pad-right:180px;
  --content-max-h:960px;
  --bg:#0D0D0D;
  --text:#FFFFFF;
  --text2:#B0B0B0;
  --accent:#FF3B30;
  --chip-bg:#1A1A1A;
  --chip-border:1px solid #333;
  --safe-line:2px solid cyan;
}
html,body{width:100%;height:100%;background:#222;font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}
.toolbar{
  position:fixed;top:0;left:0;right:0;z-index:9999;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;height:48px;
  background:rgba(13,13,13,.96);border-bottom:1px solid #222;
}
.tb-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--accent);}
.tb-controls{display:flex;align-items:center;gap:12px;}
.tbtn{
  padding:5px 14px;border:1px solid #444;
  background:transparent;color:var(--text2);cursor:pointer;
  border-radius:3px;font-size:11px;font-family:'DM Sans',sans-serif;
  transition:all .15s;
}
.tbtn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.slide-container{
  position:fixed;top:48px;left:50%;transform:translateX(-50%);
  width:var(--canvas-width);height:var(--canvas-height);overflow:hidden;
}
.slide{
  position:absolute;top:0;left:0;
  width:var(--canvas-width);height:var(--canvas-height);
  opacity:0;pointer-events:none;transition:opacity .35s ease;
}
.slide.active{opacity:1;pointer-events:auto;}
.slide-frame{
  width:var(--canvas-width);height:var(--canvas-height);
  position:relative;overflow:hidden;background:var(--bg);
}
.slide-frame::after{
  content:"";position:absolute;bottom:0;left:0;
  width:1080px;height:680px;
  background:transparent;pointer-events:none;z-index:200;
}

/* ── SPLIT LAYOUT 40/60 ── */
.split-layout{display:flex;width:1080px;height:1920px;}
.phone-side{width:40%;height:100%;overflow:hidden;flex-shrink:0;}
.phone-side img{width:100%;height:100%;object-fit:cover;display:block;}
.fallback-img{display:none;width:100%;height:100%;align-items:center;justify-content:center;background:var(--chip-bg);flex-direction:column;gap:4px;}
.fallback-img span{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text2);}
.fallback-img small{font-family:'DM Mono',monospace;font-size:10px;color:#555;}
.content-side{width:468px;padding:280px 0 40px 28px;display:flex;flex-direction:column;max-height:1920px;flex-shrink:0;}

/* ── MAGAZINE TYPOGRAPHY ── */
.rank{
  font-family:'Bebas Neue',sans-serif;
  font-size:52px;color:var(--accent);line-height:1;margin-bottom:2px;letter-spacing:2px;
}
.device-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:38px;color:var(--text);line-height:1;margin-bottom:6px;letter-spacing:1px;
}
.meta{
  font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);
  margin-bottom:10px;letter-spacing:.3px;line-height:1.4;
}
.chip-container{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:10px;}
.chip{
  display:inline-block;padding:2px 7px;
  background:var(--chip-bg);color:var(--text);
  border:var(--chip-border);border-radius:2px;
  font-size:9px;font-family:'DM Mono',monospace;line-height:1.4;white-space:nowrap;
}
.section-header{
  font-family:'Bebas Neue',sans-serif;font-size:13px;
  color:var(--accent);letter-spacing:2px;text-transform:uppercase;
  border-left:4px solid var(--accent);padding-left:8px;margin:4px 0 5px;
}
.spec-text{
  font-size:11px;color:var(--text2);line-height:1.4;margin-bottom:6px;
  font-family:'DM Sans',sans-serif;
}
.spec-soft{
  font-size:10px;color:var(--text2);line-height:1.3;margin-bottom:8px;
  font-family:'DM Mono',monospace;
}

/* ── VERDICT WITH DROP CAP ── */
.verdict{
  margin-top:6px;font-size:14px;font-weight:700;color:var(--text);line-height:1.4;
}
.verdict::first-letter{
  font-size:3em;float:left;line-height:.8;color:var(--accent);
  font-family:'Bebas Neue',sans-serif;padding-right:4px;margin-top:3px;
}

/* ── SWIPE TEXT ── */
.swipe-text{
  position:absolute;
  bottom:calc(680px + 20px);right:calc(180px + 20px);
  font-family:'DM Sans',sans-serif;font-size:14px;letter-spacing:4px;
  opacity:.6;color:var(--text2);z-index:150;
}

/* ── COVER ── */
.cover-slide .content-side{justify-content:center;}
.cover-hook{
  font-family:'Bebas Neue',sans-serif;font-size:64px;line-height:1;color:var(--text);letter-spacing:1px;
}
.cover-sub{
  font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text2);
  margin-top:14px;letter-spacing:2px;text-transform:uppercase;
}
.cover-badge{
  display:inline-block;padding:4px 12px;background:var(--accent);color:#fff;
  font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;
  margin-top:16px;
}

/* ── CLOSING ── */
.closing-slide .content-side{justify-content:center;}
.closing-text{
  font-family:'Bebas Neue',sans-serif;font-size:56px;line-height:1;color:var(--text);letter-spacing:1px;
}
.closing-sub{
  font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text2);
  margin-top:14px;letter-spacing:2px;
}

/* ── SAFE ZONE OVERLAY (sharp cyan lines only) ── */
.sz-overlay{display:none;position:absolute;inset:0;pointer-events:none;z-index:300;}
.sz-overlay.on{display:block;}
.sz-overlay::before{
  content:"";position:absolute;top:var(--pad-top);left:var(--pad-left);
  width:calc(var(--canvas-width) - var(--pad-left) - var(--pad-right));
  height:var(--content-max-h);border:2px solid cyan;pointer-events:none;
}

/* ── NAV ── */
.nav{
  position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:20px;z-index:9999;
}
.nav-btn{
  width:40px;height:40px;border:1px solid #444;
  background:rgba(13,13,13,.9);color:var(--text);cursor:pointer;
  border-radius:50%;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.nav-counter{
  font-family:'DM Mono',monospace;font-size:13px;color:var(--text2);
  min-width:56px;text-align:center;
}
</style>
</head>
<body>

<div class="toolbar">
  <div class="tb-title">EDITORIAL EDGE</div>
  <div class="tb-controls">
    <button class="tbtn" id="safeToggle">SAFE ZONE</button>
    <button class="tbtn" id="exportBtn">EXPORT PNG</button>
  </div>
</div>

<div class="slide-container" id="slideContainer"></div>

<div class="nav">
  <button class="nav-btn" id="prevBtn">&larr;</button>
  <span class="nav-counter" id="navCounter">1 / 20</span>
  <button class="nav-btn" id="nextBtn">&rarr;</button>
</div>

<script>
const IMG_BASE='https://raw.githubusercontent.com/Bigdrops/Bigdrops-carousel/main/Phones/Three-400k/';

const phones=[
  {name:'Xiaomi 14',img:'mi14.jpg',meta:'Oct 2023 · Leica · Curved · GG Victus 2',chips:['SD 8 Gen 3','6.36" LTPO 120Hz','PUBGM 120fps','CODM 120fps','eSIM','4K Selfie Leica','UFS 4.0','16GB/1TB'],spec:'4,610mAh · 90W — Gen 3 efficiency makes this battery last longer than the number suggests.',soft:'Supported up to Android 19',verdict:'The Xiaomi 14 spits on overpriced flagships. Fight me.'},
  {name:'Redmi Turbo 4 Pro',img:'turbo4pro.jpg',meta:'2025 · Flat · GG Victus',chips:['SD 8s Gen 3','6.67" AMOLED 144Hz','PUBGM 120fps','CODM 120fps','50MP OIS Main','UFS 4.0','16GB/512GB'],spec:'6,000mAh · 90W — Biggest battery on this entire list.',soft:'Supported up to Android 18',verdict:'6,000mAh of pure stamina. The camera is its only weakness.'},
  {name:'Vivo X100',img:'vivox100.jpg',meta:'Nov 2023 · Zeiss · Curved · GG Victus',chips:['Dimensity 9300','6.78" AMOLED 120Hz','PUBGM 120fps','CODM 120fps','Zeiss Periscope 5x','UFS 4.0','16GB/1TB'],spec:'5,000mAh · 120W',soft:'Supported up to Android 17',verdict:'Zeiss zoom that embarrasses phones twice its price. Shame about the selfie.'},
  {name:'Honor Magic 5 Pro',img:'magic5pro.jpg',meta:'Feb 2023 · Curved · GG Victus',chips:['SD 8 Gen 2','6.81" LTPO OLED 120Hz','PUBGM 120fps','CODM High','Dual eSIM','4K Selfie PWM','UFS 4.0','16GB/512GB'],spec:'5,100mAh · 66W',soft:'Supported up to Android 17',verdict:'The most slept-on phone in Nigeria. 4K selfie. Dual eSIM. Dynamic Island before Apple.'},
  {name:'Xiaomi 13 Pro',img:'mi13pro.jpg',meta:'Dec 2022 · Leica · Curved · GG Victus',chips:['SD 8 Gen 2','6.73" LTPO AMOLED 120Hz','PUBGM 120fps','CODM 120fps','eSIM','1-inch IMX989 Leica','UFS 4.0','12GB/512GB'],spec:'4,820mAh · 120W',soft:'End of the cycle',verdict:'1-inch sensor that humbles iPhones. Selfie that humbles the photographer.'},
  {name:'OnePlus 11',img:'oneplus11.jpg',meta:'Jan 2023 · 2.5D Glass · Hasselblad',chips:['SD 8 Gen 2','6.7" LTPO AMOLED 120Hz','PUBGM 90fps','CODM 120fps','eSIM','Hasselblad Tuned','UFS 4.0','16GB/512GB'],spec:'5,000mAh · 100W',soft:'Supported up to Android 17',verdict:'Cleanest Android experience at this price. Boring? Maybe. Reliable? Absolutely.'},
  {name:'Samsung Galaxy S23',img:'s23.jpg',meta:'Feb 2023 · Flat · GG Victus 2',chips:['SD 8 Gen 2 Galaxy','6.1" AMOLED 120Hz','PUBGM 120fps','CODM 120fps','eSIM','UFS 4.0','8GB/512GB'],spec:'3,900mAh · 25W',soft:'Supported up to Android 18',verdict:'The most polished small Android. Samsung just refuses to fix the battery.'},
  {name:'Vivo X90 Pro',img:'vivox90pro.jpg',meta:'Nov 2022 · Zeiss · Curved · GG Victus',chips:['Dimensity 9200','6.78" AMOLED 120Hz','PUBGM 90fps','CODM 120fps','1-inch IMX989 Zeiss V2','UFS 4.0','16GB/512GB'],spec:'4,870mAh · 120W',soft:'End of the cycle',verdict:'Night shots that look like studio lighting. The V2 chip is cheating.'},
  {name:'Xiaomi 13',img:'mi13.jpg',meta:'Dec 2022 · Leica · Flat · GG 5',chips:['SD 8 Gen 2','6.36" AMOLED 120Hz','PUBGM 120fps','CODM 120fps','Leica 54MP','UFS 4.0','12GB/512GB'],spec:'4,500mAh · 67W',soft:'End of the cycle',verdict:'Compact, capable, forgettable. The Honda Civic of phones.'},
  {name:'Google Pixel 8',img:'pixel8.jpg',meta:'Oct 2023 · Flat · GG Victus · 7 Yrs Updates',chips:['Tensor G3','6.2" OLED 120Hz','PUBGM Smooth','CODM High','eSIM','UFS 3.1','8GB/256GB'],spec:'4,575mAh · 27W',soft:'Supported up to Android 22',verdict:'7 years of updates and the best selfie on the list. The charging speed is a joke.'},
  {name:'iQOO Neo 9',img:'iqooneo9.jpg',meta:'Dec 2023 · CN ROM · Flat',chips:['SD 8 Gen 2','6.78" AMOLED 144Hz','PUBGM 120fps','CODM 120fps','CN ROM','UFS 4.0','16GB/512GB'],spec:'5,160mAh · 120W',soft:'Supported up to Android 17',verdict:'Built for gamers who don\'t care that the camera is average.'},
  {name:'Redmi K70',img:'redmik70.jpg',meta:'Dec 2023 · CN ROM · Flat · GG Victus',chips:['SD 8 Gen 2','6.67" AMOLED 144Hz','PUBGM 90fps','CODM 120fps','CN ROM','UFS 4.0','16GB/1TB'],spec:'5,000mAh · 90W',soft:'Supported up to Android 17',verdict:'Flagship killer still works. GG Victus takes abuse like a champ.'},
  {name:'Oppo Find X6',img:'findx6.jpg',meta:'Mar 2023 · CN ROM · Curved · Hasselblad',chips:['Dimensity 9200','6.74" LTPO AMOLED 120Hz','PUBGM 90fps','CODM High','CN ROM','Hasselblad Tuned','UFS 4.0','16GB/1TB'],spec:'5,000mAh · 80W',soft:'End of the cycle',verdict:'Hasselblad colors are gorgeous. The price tag isn\'t competitive enough.'},
  {name:'Redmi K60 Pro',img:'redmik60pro.jpg',meta:'Jan 2023 · CN ROM · Flat',chips:['SD 8 Gen 2','6.67" AMOLED 120Hz','PUBGM 90fps','CODM 120fps','CN ROM','UFS 4.0','16GB/512GB'],spec:'5,500mAh · 67W',soft:'End of the cycle',verdict:'More battery than the K70. Too bad everything else about the K70 is better.'},
  {name:'Xiaomi 12S Ultra',img:'mi12sultra.jpg',meta:'Jul 2022 · CN ROM · Leica · Curved · GG Victus',chips:['SD 8+ Gen 1','6.73" LTPO AMOLED 120Hz','PUBGM 90fps','CODM High','1-inch IMX989 Leica','UFS 4.0','16GB/1TB'],spec:'4,860mAh · 67W',soft:'End of the cycle',verdict:'Aged like fine wine for the camera. Aged like milk for the chip.'},
  {name:'Xiaomi 14T',img:'mi14t.jpg',meta:'Sep 2024 · Flat · Leica',chips:['Dimensity 8300-Ultra','6.67" AMOLED 144Hz','PUBGM 90fps','CODM High','Dual eSIM','4K Selfie Leica','UFS 4.0','12GB/512GB'],spec:'5,000mAh · 67W',soft:'Supported up to Android 18',verdict:'4K selfie is nice. Paying flagship money for a mid chip is not.'},
  {name:'ROG 6D Ultimate',img:'rog6dultimate.jpg',meta:'Sep 2022 · Gaming · Flat · GG Victus',chips:['Dimensity 9000+','6.78" AMOLED 165Hz','PUBGM 120fps','CODM 120fps','18GB RAM','UFS 3.1','18GB/512GB'],spec:'6,000mAh · 65W',soft:'End of the cycle',verdict:'165Hz. Air triggers. 18GB RAM. Everything else is a compromise.'},
  {name:'ROG Phone 6D',img:'rog6d.jpg',meta:'Sep 2022 · Gaming · Flat · GG Victus',chips:['Dimensity 9000+','6.78" AMOLED 165Hz','PUBGM 120fps','CODM 120fps','UFS 3.1','12GB/256GB'],spec:'6,000mAh · 65W',soft:'End of the cycle',verdict:'The Ultimate exists. Buy that instead.'}
];

function buildSlides(){
  const c=document.getElementById('slideContainer');
  let h='';

  // Slide 1: Cover
  h+=`<div class="slide" data-i="0"><div class="slide-frame cover-slide"><div class="split-layout"><div class="phone-side"><img src="${IMG_BASE}mi14.jpg" alt="Xiaomi 14" crossorigin="anonymous" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div class="fallback-img"><span>BIGDROPS</span><small>COVER</small></div></div><div class="content-side"><div class="cover-hook">The only list that doesn't lie.</div><div class="cover-sub">18 phones. N300K–N400K. Ranked.</div><div class="cover-badge">BIGDROPS EDITORIAL</div></div></div><div class="swipe-text">SWIPE</div><div class="sz-overlay" id="sz0"></div></div></div>`;

  // Slides 2-19: Phones
  phones.forEach((p,i)=>{
    const r=i+1;
    h+=`<div class="slide" data-i="${r}"><div class="slide-frame"><div class="split-layout"><div class="phone-side"><img src="${IMG_BASE}${p.img}" alt="${p.name}" crossorigin="anonymous" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div class="fallback-img"><span>${p.name}</span><small>MISSING ASSET</small></div></div><div class="content-side"><div class="rank">#${r}</div><div class="device-name">${p.name}</div><div class="meta">${p.meta}</div><div class="chip-container">${p.chips.map(ch=>'<span class="chip">'+ch+'</span>').join('')}</div><div class="section-header">Battery & Power</div><div class="spec-text">${p.spec}</div><div class="section-header">Software</div><div class="spec-soft">${p.soft}</div><div class="verdict">${p.verdict}</div></div></div><div class="swipe-text">SWIPE</div><div class="sz-overlay" id="sz${r}"></div></div></div>`;
  });

  // Slide 20: Closing
  h+=`<div class="slide" data-i="19"><div class="slide-frame closing-slide"><div class="split-layout"><div class="phone-side"><img src="${IMG_BASE}mi14.jpg" alt="Xiaomi 14" crossorigin="anonymous" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div class="fallback-img"><span>BIGDROPS</span><small>CLOSING</small></div></div><div class="content-side"><div class="closing-text">Pick a side. Or get left behind.</div><div class="closing-sub">BIGDROPS — 300K–400K EDITORIAL</div></div></div><div class="swipe-text">SWIPE</div><div class="sz-overlay" id="sz20"></div></div></div>`;

  c.innerHTML=h;
}

let cur=0;
function goTo(n){
  const slides=document.querySelectorAll('.slide');
  slides.forEach(s=>s.classList.remove('active'));
  cur=Math.max(0,Math.min(n,slides.length-1));
  slides[cur].classList.add('active');
  document.getElementById('navCounter').textContent=(cur+1)+' / '+slides.length;
}

let safeOn=false;
document.addEventListener('DOMContentLoaded',()=>{
  buildSlides();
  goTo(0);

  document.getElementById('prevBtn').addEventListener('click',()=>goTo(cur-1));
  document.getElementById('nextBtn').addEventListener('click',()=>goTo(cur+1));
  document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')goTo(cur-1);if(e.key==='ArrowRight')goTo(cur+1);});

  document.getElementById('safeToggle').addEventListener('click',function(){
    safeOn=!safeOn;
    this.classList.toggle('active');
    document.querySelectorAll('.sz-overlay').forEach(el=>el.classList.toggle('on',safeOn));
  });
  document.getElementById('exportBtn').addEventListener('click',function(){
    var slide=document.querySelector('.slide.active .slide-frame');
    if(typeof html2canvas!=='undefined'){
      html2canvas(slide,{backgroundColor:'#0D0D0D',scale:2,useCORS:true}).then(function(c){
        var a=document.createElement('a');a.download='editorial-slide-'+(cur+1)+'.png';a.href=c.toDataURL();a.click();
      });
    }
  });
});
</script>
</body>
</html>
