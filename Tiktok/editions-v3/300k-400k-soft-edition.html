<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>300k-400k Soft Edition</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --canvas-width:1080px;
  --canvas-height:1920px;
  --pad-top:280px;
  --pad-left:80px;
  --pad-right:180px;
  --content-max-h:960px
}
body{
  display:flex;flex-direction:column;align-items:center;
  font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;
  background:#F5F2EE
}
#toolbar{
  position:fixed;top:0;left:0;right:0;z-index:10000;
  display:flex;align-items:center;gap:12px;padding:10px 20px;
  background:#2C3A2C;color:#E8EDE8;font-size:14px;font-family:'DM Sans',sans-serif
}
#toolbar button{
  background:#8BA88B;color:#2C3A2C;border:none;padding:6px 16px;
  border-radius:4px;cursor:pointer;font-size:14px;font-weight:500;
  font-family:'DM Sans',sans-serif
}
#toolbar button:hover{background:#9BB89B}
#toolbar .right{margin-left:auto}
#slide-counter{min-width:50px;text-align:center;font-weight:500}
#slide-container{margin-top:56px;position:relative;width:1080px}
.slide-frame{width:1080px;height:1920px;position:relative;overflow:hidden;display:none;background:#F5F2EE}
.slide-frame.active{display:block}
.safe-content-zone{
  position:absolute;top:var(--pad-top);left:var(--pad-left);
  width:calc(1080px - 80px - 180px);max-height:var(--content-max-h);
  overflow-y:auto
}
.slide-frame::after{
  content:"";position:absolute;bottom:0;left:0;width:1080px;
  height:680px;background:transparent;pointer-events:none;z-index:200
}
.sl{display:none;position:fixed;background:#00FFFF;z-index:9999;pointer-events:none}
body.show-safe .sl{display:block}
.sl-vl{width:2px;height:100vh;top:0;left:80px}
.sl-vr{width:2px;height:100vh;top:0;left:900px}
.sl-ht{height:2px;width:100vw;top:280px;left:0}
.sl-hb{height:2px;width:100vw;top:1240px;left:0}
.swipe{
  position:absolute;bottom:20px;right:20px;
  font-family:'DM Sans',sans-serif;font-size:14px;
  letter-spacing:4px;opacity:0.6;text-transform:uppercase;color:#5A6B5A
}
#pw{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;width:300px}
#pb{width:100%;height:6px;background:#E8EDE8;border-radius:3px;overflow:hidden}
#pf{height:100%;width:0%;background:#8BA88B;transition:width 0.3s}
#pt{text-align:center;font-size:12px;color:#8BA88B;margin-top:4px;font-family:'DM Sans',sans-serif}
/* Soft edition */
.card{
  background:#FFFFFF;border-radius:20px;padding:24px;
  box-shadow:0 4px 20px rgba(44,58,44,0.06),0 1px 4px rgba(44,58,44,0.04);
  position:relative
}
.rank{
  font-size:44px;font-weight:700;color:#8BA88B;line-height:1;margin-bottom:8px;opacity:0.5
}
.phone-flex{display:flex;gap:20px;align-items:flex-start}
.img-wrap{flex-shrink:0;width:180px}
.img-wrap img{width:100%;height:auto;display:block;border-radius:12px}
.img-wrap.stagger{transform:translateX(20px)}
.info{flex:1;min-width:0}
.pname{font-size:24px;font-weight:700;color:#2C3A2C;line-height:1.2;margin-bottom:4px}
.pmeta{font-size:12px;color:#5A6B5A;margin-bottom:10px;line-height:1.4}
.pdiv{height:1px;background:#C8D5C8;margin:10px 0}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.chip{display:inline-block;padding:3px 10px;background:#E8EDE8;color:#2C3A2C;border-radius:12px;font-size:10px;font-weight:500;white-space:nowrap}
.pspec{font-size:12px;color:#2C3A2C;line-height:1.5;margin-bottom:3px}
.pspec em{color:#5A6B5A;font-style:normal;font-weight:500}
.pverdict{margin-top:10px;padding:10px 14px;background:#E8EDE8;border-radius:12px;font-size:13px;color:#2C3A2C;font-weight:500;line-height:1.4}
/* Cover */
.cover-slide{
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;height:100%;padding:60px 80px
}
.cover-tag{padding:8px 24px;background:#E8EDE8;border-radius:20px;color:#2C3A2C;font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-bottom:30px}
.cover-h1{font-size:50px;font-weight:700;color:#2C3A2C;line-height:1.15;max-width:780px}
.cover-sub{font-size:18px;color:#5A6B5A;margin-top:16px}
/* Closing */
.close-slide{
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;height:100%;padding:60px 80px
}
.close-h2{font-size:42px;font-weight:700;color:#2C3A2C;line-height:1.2;max-width:680px}
.close-p{font-size:17px;color:#5A6B5A;margin-top:18px;max-width:560px;line-height:1.5}
</style>
</head>
<body>
<div id="toolbar">
  <button id="prev-slide">&larr;</button>
  <span id="slide-counter">1 / 20</span>
  <button id="next-slide">&rarr;</button>
  <button id="safe-toggle" class="right">Safe Zone</button>
  <button id="export-btn">Export PNG</button>
</div>
<div id="slide-container"></div>
<div class="sl sl-vl"></div>
<div class="sl sl-vr"></div>
<div class="sl sl-ht"></div>
<div class="sl sl-hb"></div>
<div id="pw"><div id="pb"><div id="pf"></div></div><div id="pt"></div></div>
<script>
const IMG_BASE='https://raw.githubusercontent.com/Bigdrops/Bigdrops-carousel/main/Phones/Three-400k/';
const phones=[
  {name:'Xiaomi 14',meta:'Oct 2023 &middot; Leica &middot; Curved &middot; GG Victus 2',chips:['Snapdragon 8 Gen 3','6.36" LTPO AMOLED 120Hz','PUBGM 120fps','CODM 120fps','eSIM','4K Selfie Leica','UFS 4.0','Up to 16GB/1TB'],spec:'4,610mAh &middot; 90W &mdash; Gen 3 efficiency makes this battery last longer than the number suggests.',software:'Supported up to Android 19',verdict:'It&rsquo;s the smart choice. No drama, just results.',img:'mi14'},
  {name:'Redmi Turbo 4 Pro',meta:'2025 &middot; Flat Screen &middot; GG Victus',chips:['Snapdragon 8s Gen 3','6.67" AMOLED 144Hz','PUBGM 120fps','CODM 120fps','50MP OIS Main','UFS 4.0','Up to 16GB/512GB'],spec:'6,000mAh &middot; 90W &mdash; Biggest battery on this entire list.',software:'Supported up to Android 18',verdict:'Battery king. Just don&rsquo;t expect flagship cameras.',img:'turbo4pro'},
  {name:'Vivo X100',meta:'Nov 2023 &middot; Zeiss &middot; Curved &middot; GG Victus',chips:['Dimensity 9300','6.78" AMOLED 120Hz','PUBGM 120fps','CODM 120fps','Zeiss Periscope 5x','UFS 4.0','Up to 16GB/1TB'],spec:'5,000mAh &middot; 120W &mdash; Dimensity 9300 all-big-core.',software:'Supported up to Android 17',verdict:'Zeiss zoom makes you feel like a photographer. The selfie cuts corners, but the rear is magic.',img:'vivox100'},
  {name:'Honor Magic 5 Pro',meta:'Feb 2023 &middot; Curved &middot; GG Victus',chips:['Snapdragon 8 Gen 2','6.81" LTPO OLED 120Hz','PUBGM 120fps','CODM High','Dual eSIM','4K Selfie Eye-Safe PWM','UFS 4.0','Up to 16GB/512GB'],spec:'5,100mAh &middot; 66W',software:'Supported up to Android 17',verdict:'Most people overlook this one. That&rsquo;s exactly why you should consider it.',img:'magic5pro'},
  {name:'Xiaomi 13 Pro',meta:'Dec 2022 &middot; Leica &middot; Curved &middot; GG Victus',chips:['Snapdragon 8 Gen 2','6.73" LTPO AMOLED 120Hz','PUBGM 120fps','CODM 120fps','eSIM','1-inch IMX989 Leica','UFS 4.0','Up to 12GB/512GB'],spec:'4,820mAh &middot; 120W',software:'End of the cycle',verdict:'That 1-inch sensor is special. The selfie is not. Know what matters to you.',img:'mi13pro'},
  {name:'OnePlus 11',meta:'Jan 2023 &middot; 2.5D Glass &middot; Hasselblad',chips:['Snapdragon 8 Gen 2','6.7" LTPO AMOLED 120Hz','PUBGM 90fps','CODM 120fps','eSIM','Hasselblad Tuned','UFS 4.0','Up to 16GB/512GB'],spec:'5,000mAh &middot; 100W',software:'Supported up to Android 17',verdict:'Smooth operator. OxygenOS keeps things clean and fast.',img:'oneplus11'},
  {name:'Samsung Galaxy S23',meta:'Feb 2023 &middot; Flat &middot; GG Victus 2',chips:['SD 8 Gen 2 for Galaxy','6.1" AMOLED 120Hz','PUBGM 120fps','CODM 120fps','eSIM','25W Charging','UFS 4.0','Up to 8GB/512GB'],spec:'3,900mAh &middot; 25W',software:'Supported up to Android 18',verdict:'The compact king. Just budget for a powerbank.',img:'s23'},
  {name:'Vivo X90 Pro',meta:'Nov 2022 &middot; Zeiss &middot; Curved &middot; GG Victus',chips:['Dimensity 9200','6.78" AMOLED 120Hz','PUBGM 90fps','CODM 120fps','1-inch IMX989 Zeiss V2','UFS 4.0','Up to 16GB/512GB'],spec:'4,870mAh &middot; 120W',software:'End of the cycle',verdict:'Low light photography that rivals DSLRs. The front camera reminds you it&rsquo;s a phone.',img:'vivox90pro'},
  {name:'Xiaomi 13',meta:'Dec 2022 &middot; Leica &middot; Flat &middot; GG 5',chips:['Snapdragon 8 Gen 2','6.36" AMOLED 120Hz','PUBGM 120fps','CODM 120fps','Leica Tuned 54MP','UFS 4.0','Up to 12GB/512GB'],spec:'4,500mAh &middot; 67W',software:'End of the cycle',verdict:'Solid all-rounder. Flat screen, compact, reliable. No surprises.',img:'mi13'},
  {name:'Google Pixel 8',meta:'Oct 2023 &middot; Flat &middot; GG Victus &middot; 7 Yrs Updates',chips:['Tensor G3','6.2" OLED 120Hz','PUBGM Smooth','CODM High','eSIM','27W Charging','UFS 3.1','Up to 8GB/256GB'],spec:'4,575mAh &middot; 27W',software:'Supported up to Android 22',verdict:'Seven years of updates means this phone grows with you.',img:'pixel8'},
  {name:'iQOO Neo 9',meta:'Dec 2023 &middot; CN ROM &middot; Flat Screen',chips:['Snapdragon 8 Gen 2','6.78" AMOLED 144Hz','PUBGM 120fps','CODM 120fps','CN ROM','UFS 4.0','Up to 16GB/512GB'],spec:'5,160mAh &middot; 120W',software:'Supported up to Android 17',verdict:'If gaming is your thing, this is your thing.',img:'iqooneo9'},
  {name:'Redmi K70',meta:'Dec 2023 &middot; CN ROM &middot; Flat &middot; GG Victus',chips:['Snapdragon 8 Gen 2','6.67" AMOLED 144Hz','PUBGM 90fps','CODM 120fps','CN ROM','UFS 4.0','Up to 16GB/1TB'],spec:'5,000mAh &middot; 90W',software:'Supported up to Android 17',verdict:'Flagship performance without the flagship price tag.',img:'redmik70'},
  {name:'Oppo Find X6',meta:'Mar 2023 &middot; CN ROM &middot; Curved &middot; Hasselblad',chips:['Dimensity 9200','6.74" LTPO AMOLED 120Hz','PUBGM 90fps','CODM High','CN ROM','Hasselblad Tuned','UFS 4.0','Up to 16GB/1TB'],spec:'5,000mAh &middot; 80W',software:'End of the cycle',verdict:'Hasselblad colors are beautiful. But the competition just edges ahead.',img:'findx6'},
  {name:'Redmi K60 Pro',meta:'Jan 2023 &middot; CN ROM &middot; Flat Screen',chips:['Snapdragon 8 Gen 2','6.67" AMOLED 120Hz','PUBGM 90fps','CODM 120fps','CN ROM','UFS 4.0','Up to 16GB/512GB'],spec:'5,500mAh &middot; 67W',software:'End of the cycle',verdict:'The extra battery is nice. But the K70 is just better value now.',img:'redmik60pro'},
  {name:'Xiaomi 12S Ultra',meta:'Jul 2022 &middot; CN ROM &middot; Leica &middot; Curved &middot; GG Victus',chips:['Snapdragon 8+ Gen 1','6.73" LTPO AMOLED 120Hz','PUBGM 90fps','CODM High','1-inch IMX989 Leica','UFS 4.0','Up to 16GB/1TB'],spec:'4,860mAh &middot; 67W',software:'End of the cycle',verdict:'The camera still dominates. But the chip shows its age.',img:'mi12sultra'},
  {name:'Xiaomi 14T',meta:'Sep 2024 &middot; Flat Screen &middot; Leica',chips:['Dimensity 8300-Ultra','6.67" AMOLED 144Hz','PUBGM 90fps','CODM High','Dual eSIM','4K Selfie Leica','UFS 4.0','Up to 12GB/512GB'],spec:'5,000mAh &middot; 67W',software:'Supported up to Android 18',verdict:'Great selfie, great screen. Just not enough chip for the price.',img:'mi14t'},
  {name:'ROG 6D Ultimate',meta:'Sep 2022 &middot; Gaming &middot; Flat &middot; GG Victus',chips:['Dimensity 9000+','6.78" AMOLED 165Hz','PUBGM 120fps','CODM 120fps','18GB RAM','UFS 3.1','Up to 18GB/512GB'],spec:'6,000mAh &middot; 65W',software:'End of the cycle',verdict:'The ultimate gaming machine. Just don&rsquo;t ask it to be your daily driver.',img:'rog6dultimate'},
  {name:'ROG Phone 6D',meta:'Sep 2022 &middot; Gaming &middot; Flat &middot; GG Victus',chips:['Dimensity 9000+','6.78" AMOLED 165Hz','PUBGM 120fps','CODM 120fps','UFS 3.1','Up to 12GB/256GB'],spec:'6,000mAh &middot; 65W',software:'End of the cycle',verdict:'Same chip as the Ultimate, but less of everything else. The Ultimate is the better pick.',img:'rog6d'}
];
const slides=[{type:'cover'},...phones.map((p,i)=>({type:'phone',phone:p,idx:i})),{type:'closing'}];
let current=0;
const container=document.getElementById('slide-container');
function render(){
  container.innerHTML='';
  slides.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='slide-frame'+(i===current?' active':'');
    if(s.type==='cover'){
      el.innerHTML='<div class="cover-slide"><div class="cover-tag">300K &ndash; 400K</div><div class="cover-h1">You don&rsquo;t need to overspend. Here&rsquo;s the soft landing.</div><div class="cover-sub">18 phones. Real specs. No fluff.</div></div>';
    }else if(s.type==='closing'){
      el.innerHTML='<div class="close-slide"><div class="close-h2">Spend smart, sleep well.</div><div class="close-p">Your wallet will thank you in the morning.</div></div>';
    }else{
      const p=s.phone,stg=s.idx%2?'stagger':'';
      el.innerHTML='<div class="safe-content-zone"><div class="card"><div class="rank">#'+(s.idx+1)+'</div><div class="phone-flex"><div class="img-wrap '+stg+'"><img src="'+IMG_BASE+p.img+'.jpg" alt="'+p.name+'" loading="lazy"></div><div class="info"><div class="pname">'+p.name+'</div><div class="pmeta">'+p.meta+'</div><div class="pdiv"></div><div class="chips">'+p.chips.map(c=>'<span class="chip">'+c+'</span>').join('')+'</div><div class="pspec"><em>Battery:</em> '+p.spec+'</div><div class="pspec"><em>Software:</em> '+p.software+'</div><div class="pverdict">'+p.verdict+'</div></div></div></div><div class="swipe">SWIPE</div></div>';
    }
    container.appendChild(el);
  });
  document.getElementById('slide-counter').textContent=(current+1)+' / '+slides.length;
}
function goTo(n){
  document.querySelectorAll('.slide-frame').forEach((f,i)=>f.classList.toggle('active',i===n));
  current=n;
  document.getElementById('slide-counter').textContent=(current+1)+' / '+slides.length;
}
document.getElementById('prev-slide').addEventListener('click',()=>{if(current>0)goTo(current-1)});
document.getElementById('next-slide').addEventListener('click',()=>{if(current<slides.length-1)goTo(current+1)});
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'&&current>0)goTo(current-1);if(e.key==='ArrowRight'&&current<slides.length-1)goTo(current+1)});
document.getElementById('safe-toggle').addEventListener('click',()=>document.body.classList.toggle('show-safe'));
document.getElementById('export-btn').addEventListener('click',function(){
  var el=document.querySelector('.slide-frame.active');
  if(typeof html2canvas!=='undefined'){
    html2canvas(el,{backgroundColor:'#F5F2EE',scale:2,useCORS:true}).then(function(c){
      var a=document.createElement('a');a.download='soft-slide-'+(current+1)+'.png';a.href=c.toDataURL();a.click();
    });
  }
});
render();
</script>
</body>
</html>
