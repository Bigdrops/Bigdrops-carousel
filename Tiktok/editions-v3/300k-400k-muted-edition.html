<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>300k-400k Muted Edition</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --canvas-width:1080px;
  --canvas-height:1920px;
  --pad-top:280px;
  --pad-left:80px;
  --pad-right:180px;
  --content-max-h:960px
}
body{
  display:flex;flex-direction:column;align-items:center;
  font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;
  background:#1A1C20
}
#toolbar{
  position:fixed;top:0;left:0;right:0;z-index:10000;
  display:flex;align-items:center;gap:12px;padding:10px 20px;
  background:#2A2C30;color:#E8E6E0;font-size:14px;font-family:'DM Sans',sans-serif
}
#toolbar button{
  background:#3A3C40;color:#E8E6E0;border:none;padding:6px 16px;
  border-radius:4px;cursor:pointer;font-size:14px;font-weight:500;
  font-family:'DM Sans',sans-serif
}
#toolbar button:hover{background:#4A4C50}
#toolbar .right{margin-left:auto}
#slide-counter{min-width:50px;text-align:center;font-weight:500}
#slide-container{margin-top:56px;position:relative;width:1080px}
.slide-frame{width:1080px;height:1920px;position:relative;overflow:hidden;display:none;background:#1A1C20}
.slide-frame.active{display:block}
.safe-content-zone{
  position:absolute;top:var(--pad-top);left:var(--pad-left);
  width:calc(1080px - 80px - 180px);max-height:var(--content-max-h);
  overflow-y:auto
}
.slide-frame::after{
  content:"";position:absolute;bottom:0;left:0;width:1080px;
  height:680px;background:transparent;pointer-events:none;z-index:200
}
.sl{display:none;position:fixed;background:#00FFFF;z-index:9999;pointer-events:none}
body.show-safe .sl{display:block}
.sl-vl{width:2px;height:100vh;top:0;left:80px}
.sl-vr{width:2px;height:100vh;top:0;left:900px}
.sl-ht{height:2px;width:100vw;top:280px;left:0}
.sl-hb{height:2px;width:100vw;top:1240px;left:0}
.swipe{
  position:absolute;bottom:20px;right:20px;
  font-family:'DM Sans',sans-serif;font-size:14px;
  letter-spacing:4px;opacity:0.6;text-transform:uppercase;color:#9A9890
}
#pw{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;width:300px}
#pb{width:100%;height:6px;background:#2A2C30;border-radius:0;overflow:hidden}
#pf{height:100%;width:0%;background:#D64045;transition:width 0.3s}
#pt{text-align:center;font-size:12px;color:#9A9890;margin-top:4px;font-family:'DM Sans',sans-serif}
/* Muted edition — no radius, no cards, strict 8px grid */
.m-content{padding:0;position:relative}
.m-rank{font-size:48px;font-weight:700;color:#D64045;line-height:1;margin-bottom:8px}
.m-name{font-size:26px;font-weight:700;color:#E8E6E0;line-height:1.2;margin-bottom:4px}
.m-meta{font-size:12px;color:#9A9890;margin-bottom:16px;line-height:1.4}
.m-img{width:160px;margin-bottom:16px}
.m-img img{width:100%;height:auto;display:block}
.m-line{border-bottom:1px solid #2A2C30;padding-bottom:8px;margin-bottom:8px}
.m-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px}
.m-chip{display:inline-block;padding:3px 10px;background:#2A2C30;color:#E8E6E0;font-size:10px;font-weight:500;white-space:nowrap}
.mspec{font-size:12px;color:#E8E6E0;line-height:1.5;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid #2A2C30}
.mspec em{color:#9A9890;font-style:normal;font-weight:500}
.m-verdict{margin-top:16px;font-size:14px;color:#E8E6E0;font-weight:500;line-height:1.4;padding-top:8px;border-top:1px solid #2A2C30}
/* Cover */
.m-cover{
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;height:100%;padding:60px 80px
}
.m-cover-tag{padding:8px 24px;border:1px solid #3A3C40;color:#9A9890;font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px}
.m-cover-h1{font-size:52px;font-weight:700;color:#E8E6E0;line-height:1.1;max-width:760px}
.m-cover-sub{font-size:18px;color:#9A9890;margin-top:16px}
/* Closing */
.m-close{
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;height:100%;padding:60px 80px
}
.m-close-h2{font-size:44px;font-weight:700;color:#E8E6E0;line-height:1.2;max-width:660px}
.m-close-p{font-size:17px;color:#9A9890;margin-top:16px;max-width:540px;line-height:1.5}
</style>
</head>
<body>
<div id="toolbar">
  <button id="prev-slide">&larr;</button>
  <span id="slide-counter">1 / 20</span>
  <button id="next-slide">&rarr;</button>
  <button id="safe-toggle" class="right">Safe Zone</button>
  <button id="export-btn">Export PNG</button>
</div>
<div id="slide-container"></div>
<div class="sl sl-vl"></div>
<div class="sl sl-vr"></div>
<div class="sl sl-ht"></div>
<div class="sl sl-hb"></div>
<div id="pw"><div id="pb"><div id="pf"></div></div><div id="pt"></div></div>
<script>
const IMG_BASE='https://raw.githubusercontent.com/Bigdrops/Bigdrops-carousel/main/Phones/Three-400k/';
const phones=[
  {name:'Xiaomi 14',meta:'Oct 2023 &middot; Leica &middot; Curved &middot; GG Victus 2',chips:['Snapdragon 8 Gen 3','6.36" LTPO AMOLED 120Hz','PUBGM 120fps','CODM 120fps','eSIM','4K Selfie Leica','UFS 4.0','Up to 16GB/1TB'],spec:'4,610mAh &middot; 90W &mdash; Gen 3 efficiency makes this battery last longer than the number suggests.',software:'Supported up to Android 19',verdict:'SD 8 Gen 3. 90W. 4K selfie. Statistically the best value.',img:'mi14'},
  {name:'Redmi Turbo 4 Pro',meta:'2025 &middot; Flat Screen &middot; GG Victus',chips:['Snapdragon 8s Gen 3','6.67" AMOLED 144Hz','PUBGM 120fps','CODM 120fps','50MP OIS Main','UFS 4.0','Up to 16GB/512GB'],spec:'6,000mAh &middot; 90W &mdash; Biggest battery on this entire list.',software:'Supported up to Android 18',verdict:'6,000mAh with 8s Gen 3. Camera is average. Battery is exceptional.',img:'turbo4pro'},
  {name:'Vivo X100',meta:'Nov 2023 &middot; Zeiss &middot; Curved &middot; GG Victus',chips:['Dimensity 9300','6.78" AMOLED 120Hz','PUBGM 120fps','CODM 120fps','Zeiss Periscope 5x','UFS 4.0','Up to 16GB/1TB'],spec:'5,000mAh &middot; 120W &mdash; Dimensity 9300 all-big-core.',software:'Supported up to Android 17',verdict:'Dimensity 9300. Zeiss 5x periscope. 120W. Selfie is 1080p &mdash; the tradeoff.',img:'vivox100'},
  {name:'Honor Magic 5 Pro',meta:'Feb 2023 &middot; Curved &middot; GG Victus',chips:['Snapdragon 8 Gen 2','6.81" LTPO OLED 120Hz','PUBGM 120fps','CODM High','Dual eSIM','4K Selfie Eye-Safe PWM','UFS 4.0','Up to 16GB/512GB'],spec:'5,100mAh &middot; 66W',software:'Supported up to Android 17',verdict:'4K selfie. Dual eSIM. PWM dimming. Most underrated phone in Nigeria.',img:'magic5pro'},
  {name:'Xiaomi 13 Pro',meta:'Dec 2022 &middot; Leica &middot; Curved &middot; GG Victus',chips:['Snapdragon 8 Gen 2','6.73" LTPO AMOLED 120Hz','PUBGM 120fps','CODM 120fps','eSIM','1-inch IMX989 Leica','UFS 4.0','Up to 12GB/512GB'],spec:'4,820mAh &middot; 120W',software:'End of the cycle',verdict:'1-inch IMX989. SD 8 Gen 2. 120W. Selfie is 1080p. Pick your priority.',img:'mi13pro'},
  {name:'OnePlus 11',meta:'Jan 2023 &middot; 2.5D Glass &middot; Hasselblad',chips:['Snapdragon 8 Gen 2','6.7" LTPO AMOLED 120Hz','PUBGM 90fps','CODM 120fps','eSIM','Hasselblad Tuned','UFS 4.0','Up to 16GB/512GB'],spec:'5,000mAh &middot; 100W',software:'Supported up to Android 17',verdict:'Clean OxygenOS. 100W. No bloat. Reliable daily driver.',img:'oneplus11'},
  {name:'Samsung Galaxy S23',meta:'Feb 2023 &middot; Flat &middot; GG Victus 2',chips:['SD 8 Gen 2 for Galaxy','6.1" AMOLED 120Hz','PUBGM 120fps','CODM 120fps','eSIM','25W Charging','UFS 4.0','Up to 8GB/512GB'],spec:'3,900mAh &middot; 25W',software:'Supported up to Android 18',verdict:'Best compact Android. 25W charging is an insult. Carry a powerbank.',img:'s23'},
  {name:'Vivo X90 Pro',meta:'Nov 2022 &middot; Zeiss &middot; Curved &middot; GG Victus',chips:['Dimensity 9200','6.78" AMOLED 120Hz','PUBGM 90fps','CODM 120fps','1-inch IMX989 Zeiss V2','UFS 4.0','Up to 16GB/512GB'],spec:'4,870mAh &middot; 120W',software:'End of the cycle',verdict:'1-inch sensor plus V2 chip. Best low light. Selfie is average.',img:'vivox90pro'},
  {name:'Xiaomi 13',meta:'Dec 2022 &middot; Leica &middot; Flat &middot; GG 5',chips:['Snapdragon 8 Gen 2','6.36" AMOLED 120Hz','PUBGM 120fps','CODM 120fps','Leica Tuned 54MP','UFS 4.0','Up to 12GB/512GB'],spec:'4,500mAh &middot; 67W',software:'End of the cycle',verdict:'SD 8 Gen 2. Flat screen. Compact. No drama. Solid.',img:'mi13'},
  {name:'Google Pixel 8',meta:'Oct 2023 &middot; Flat &middot; GG Victus &middot; 7 Yrs Updates',chips:['Tensor G3','6.2" OLED 120Hz','PUBGM Smooth','CODM High','eSIM','27W Charging','UFS 3.1','Up to 8GB/256GB'],spec:'4,575mAh &middot; 27W',software:'Supported up to Android 22',verdict:'7 years of updates. Best software. Slowest charging. Pick your tradeoff.',img:'pixel8'},
  {name:'iQOO Neo 9',meta:'Dec 2023 &middot; CN ROM &middot; Flat Screen',chips:['Snapdragon 8 Gen 2','6.78" AMOLED 144Hz','PUBGM 120fps','CODM 120fps','CN ROM','UFS 4.0','Up to 16GB/512GB'],spec:'5,160mAh &middot; 120W',software:'Supported up to Android 17',verdict:'SD 8 Gen 2. 120W. CN ROM. For gamers who don&rsquo;t care about cameras.',img:'iqooneo9'},
  {name:'Redmi K70',meta:'Dec 2023 &middot; CN ROM &middot; Flat &middot; GG Victus',chips:['Snapdragon 8 Gen 2','6.67" AMOLED 144Hz','PUBGM 90fps','CODM 120fps','CN ROM','UFS 4.0','Up to 16GB/1TB'],spec:'5,000mAh &middot; 90W',software:'Supported up to Android 17',verdict:'SD 8 Gen 2 at budget price. CN ROM. Average camera. Performance wins.',img:'redmik70'},
  {name:'Oppo Find X6',meta:'Mar 2023 &middot; CN ROM &middot; Curved &middot; Hasselblad',chips:['Dimensity 9200','6.74" LTPO AMOLED 120Hz','PUBGM 90fps','CODM High','CN ROM','Hasselblad Tuned','UFS 4.0','Up to 16GB/1TB'],spec:'5,000mAh &middot; 80W',software:'End of the cycle',verdict:'Hasselblad tuning. CN ROM. Outclassed by competition at similar price.',img:'findx6'},
  {name:'Redmi K60 Pro',meta:'Jan 2023 &middot; CN ROM &middot; Flat Screen',chips:['Snapdragon 8 Gen 2','6.67" AMOLED 120Hz','PUBGM 90fps','CODM 120fps','CN ROM','UFS 4.0','Up to 16GB/512GB'],spec:'5,500mAh &middot; 67W',software:'End of the cycle',verdict:'5,500mAh. Slower than K70. Older than K70. K70 is the better buy.',img:'redmik60pro'},
  {name:'Xiaomi 12S Ultra',meta:'Jul 2022 &middot; CN ROM &middot; Leica &middot; Curved &middot; GG Victus',chips:['Snapdragon 8+ Gen 1','6.73" LTPO AMOLED 120Hz','PUBGM 90fps','CODM High','1-inch IMX989 Leica','UFS 4.0','Up to 16GB/1TB'],spec:'4,860mAh &middot; 67W',software:'End of the cycle',verdict:'1-inch Leica sensor. SD 8+ Gen 1 is old. Buy only for the camera.',img:'mi12sultra'},
  {name:'Xiaomi 14T',meta:'Sep 2024 &middot; Flat Screen &middot; Leica',chips:['Dimensity 8300-Ultra','6.67" AMOLED 144Hz','PUBGM 90fps','CODM High','Dual eSIM','4K Selfie Leica','UFS 4.0','Up to 12GB/512GB'],spec:'5,000mAh &middot; 67W',software:'Supported up to Android 18',verdict:'4K selfie. Mid chip at flagship price. Competitors have SD 8 Gen 2.',img:'mi14t'},
  {name:'ROG 6D Ultimate',meta:'Sep 2022 &middot; Gaming &middot; Flat &middot; GG Victus',chips:['Dimensity 9000+','6.78" AMOLED 165Hz','PUBGM 120fps','CODM 120fps','18GB RAM','UFS 3.1','Up to 18GB/512GB'],spec:'6,000mAh &middot; 65W',software:'End of the cycle',verdict:'165Hz. 18GB RAM. Air triggers. Gaming beast. Average phone.',img:'rog6dultimate'},
  {name:'ROG Phone 6D',meta:'Sep 2022 &middot; Gaming &middot; Flat &middot; GG Victus',chips:['Dimensity 9000+','6.78" AMOLED 165Hz','PUBGM 120fps','CODM 120fps','UFS 3.1','Up to 12GB/256GB'],spec:'6,000mAh &middot; 65W',software:'End of the cycle',verdict:'Same chip. Less RAM. Weaker cooling. Ultimate is the better buy.',img:'rog6d'}
];
const slides=[{type:'cover'},...phones.map((p,i)=>({type:'phone',phone:p,idx:i})),{type:'closing'}];
let current=0;
const container=document.getElementById('slide-container');
function render(){
  container.innerHTML='';
  slides.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='slide-frame'+(i===current?' active':'');
    if(s.type==='cover'){
      el.innerHTML='<div class="m-cover"><div class="m-cover-tag">300K &ndash; 400K</div><div class="m-cover-h1">No hype. Just data.</div><div class="m-cover-sub">18 phones. Real specs. No fluff.</div></div>';
    }else if(s.type==='closing'){
      el.innerHTML='<div class="m-close"><div class="m-close-h2">Decide with evidence.</div><div class="m-close-p">Everything else is noise.</div></div>';
    }else{
      const p=s.phone;
      el.innerHTML='<div class="safe-content-zone"><div class="m-content"><div class="m-rank">#'+(s.idx+1)+'</div><div class="m-img"><img src="'+IMG_BASE+p.img+'.jpg" alt="'+p.name+'" loading="lazy"></div><div class="m-name">'+p.name+'</div><div class="m-meta">'+p.meta+'</div><div class="m-chips">'+p.chips.map(c=>'<span class="m-chip">'+c+'</span>').join('')+'</div><div class="m-line"></div><div class="mspec"><em>Battery:</em> '+p.spec+'</div><div class="mspec"><em>Software:</em> '+p.software+'</div><div class="m-verdict">'+p.verdict+'</div></div><div class="swipe">SWIPE</div></div>';
    }
    container.appendChild(el);
  });
  document.getElementById('slide-counter').textContent=(current+1)+' / '+slides.length;
}
function goTo(n){
  document.querySelectorAll('.slide-frame').forEach((f,i)=>f.classList.toggle('active',i===n));
  current=n;
  document.getElementById('slide-counter').textContent=(current+1)+' / '+slides.length;
}
document.getElementById('prev-slide').addEventListener('click',()=>{if(current>0)goTo(current-1)});
document.getElementById('next-slide').addEventListener('click',()=>{if(current<slides.length-1)goTo(current+1)});
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'&&current>0)goTo(current-1);if(e.key==='ArrowRight'&&current<slides.length-1)goTo(current+1)});
document.getElementById('safe-toggle').addEventListener('click',()=>document.body.classList.toggle('show-safe'));
document.getElementById('export-btn').addEventListener('click',function(){
  var el=document.querySelector('.slide-frame.active');
  if(typeof html2canvas!=='undefined'){
    html2canvas(el,{backgroundColor:'#1A1C20',scale:2,useCORS:true}).then(function(c){
      var a=document.createElement('a');a.download='muted-slide-'+(current+1)+'.png';a.href=c.toDataURL();a.click();
    });
  }
});
render();
</script>
</body>
</html>
