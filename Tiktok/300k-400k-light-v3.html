const BG = ['#FFFFFF','#E0F2FE','#DCFCE7','#F1F5F9','#FDFBF7'];

function buildPhoneSlide(p, idx){
  const bgIdx = (idx + 1) % BG.length;
  const s = document.createElement('div');
  s.className = 'slide-container';
  s.id = 's' + (idx + 2);
  const slide = document.createElement('div');
  slide.className = 'slide phone-slide';
  slide.style.background = BG[bgIdx];
  slide.style.display = 'flex';
  slide.style.flexDirection = 'column';

  let chipHtml = '';
  if(p.chip){
    const cls = p.chip.toLowerCase();
    chipHtml = '<span class="chip-tag ' + cls + '">' + p.chip + '</span>';
  }

  let featuresHtml = '';
  if(p.features && p.features.length){
    featuresHtml = p.features.map(function(f){
      var chipCls = 'gray';
      if(f.indexOf('eSIM') > -1 || f.indexOf('4K') > -1 || f.indexOf('Dual') > -1) chipCls = 'blue';
      else if(f.indexOf('Leica') > -1 || f.indexOf('Zeiss') > -1 || f.indexOf('Hasselblad') > -1) chipCls = 'green';
      else if(f.indexOf('Periscope') > -1 || f.indexOf('IMX') > -1) chipCls = 'amber';
      else if(f.indexOf('Wireless') > -1 || f.indexOf('Q1') > -1 || f.indexOf('Portal') > -1 || f.indexOf('Trigger') > -1) chipCls = 'amber';
      return '<span class="spec-chip ' + chipCls + '">' + f + '</span>';
    }).join('');

  slide.innerHTML = `

      <div style="display:flex;align-items:center;margin-bottom:2px;flex-shrink:0">
        <span class="rank-badge">${String(p.rank).padStart(2,'0')}</span>
        <span class="phone-name">${p.name}</span>
        ${chipHtml}
      </div>

      <div class="img-box" style="flex-shrink:0;height:46%">
        <img src="${p.img}" alt="${p.name}"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="fallback">${p.name}</div>
      </div>

      <div class="spec-chips" style="flex-shrink:0">
        <span class="spec-chip blue">${p.release}</span>
        <span class="spec-chip green">PUBGM ${p.pubgm}</span>
        <span class="spec-chip green">CODM ${p.codm}</span>
        <span class="spec-chip amber">${p.display.split('"')[0]}" ${p.display.includes('LTPO')?'LTPO':''} ${p.display.includes('AMOLED')?'AMOLED':p.display.includes('OLED')?'OLED':''}</span>

      </div>

      <div class="spec-grid" style="flex-shrink:0">
        <div class="spec-item"><div class="label">Chipset</div><div class="value">${p.chipset}</div></div>
        <div class="spec-item"><div class="label">Display</div><div class="value">${p.display}</div></div>
        <div class="spec-item"><div class="label">Battery</div><div class="value">${p.battery}</div></div>
        <div class="spec-item"><div class="label">Charging</div><div class="value">${p.charging}</div></div>
        <div class="spec-item"><div class="label">Storage</div><div class="value">${p.storage} &middot; ${p.ram}</div></div>
        <div class="spec-item"><div class="label">Build</div><div class="value">${p.build || 'Standard'}</div></div>
      </div>

      <div class="verdict" style="flex-shrink:0;flex:1;display:flex;align-items:center">
        ${p.verdict}
      </div>
    </div>
    <button class="dl-btn" onclick="downloadSlide(this)">&#x25A0; Download</button>
  `;
  s.appendChild(slide);
  return s;
}

function buildClosing(){
  const s = document.createElement('div');
  s.className = 'slide-container';
  s.id = 's20';
  const slide = document.createElement('div');
  slide.className = 'slide closing';
  slide.style.background = BG[19 % BG.length];
  slide.innerHTML = `
    <div class="slide-inner" style="position:relative;z-index:1">
      <div class="closing-headline">Nobody cares about benchmarks after six months.</div>
      <div class="closing-body">
        What matters is: does this phone survive Lagos traffic, two years of charging cycles, and your cousin&apos;s informal camera tests at family gatherings?<br><br>
        You have 18 options in this bracket. Some will age like milk. A few will surprise you.<br><br>
        Any phone on this list beats what 90% of people are using right now. Pick one, move on, and don&apos;t look back when the next model drops.
      </div>
      <div class="closing-cta">Drop your current budget in the comments. I&apos;ll tell you where it falls on the next list.</div>
      <div class="closing-follow">Follow for N400K-N500K bracket breakdown.</div>
    </div>
    <button class="dl-btn" onclick="downloadSlide(this)">&#x25A0; Download</button>
  `;
  s.appendChild(slide);
  return s;
}

function init(){
  var app = document.getElementById('app');
  app.appendChild(buildCover());
  PHONES.forEach(function(p, i){
    app.appendChild(buildPhoneSlide(p, i));
  });
  app.appendChild(buildClosing());
  updateDlCount();
}

function downloadSlide(btn){
  var container = btn.parentElement;
  var id = container.id;
  html2canvas(container, {
    scale: 2,
    width: 1080,
    height: 1920,
    useCORS: true,
    allowTaint: false,
    backgroundColor: null,
    logging: false
  }).then(function(canvas){
    var link = document.createElement('a');
    link.download = id + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  });
}

function downloadAll(){
  var containers = document.querySelectorAll('.slide-container');
  var idx = 0;
  function next(){
    if(idx >= containers.length){
      updateDlCount();
      return;
    }
    var el = containers[idx];
    document.getElementById('dlCount').textContent = (idx + 1) + ' / ' + containers.length + ' slides';
    html2canvas(el, {
      scale: 2,
      width: 1080,
      height: 1920,
      useCORS: true,
      allowTaint: false,
      backgroundColor: null,
      logging: false
    }).then(function(canvas){
      var link = document.createElement('a');
      link.download = el.id + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      idx++;
      setTimeout(next, 400);
    });
  }
  next();
}

function updateDlCount(){
  var c = document.querySelectorAll('.slide-container').length;
  document.getElementById('dlCount').textContent = c + ' / ' + c + ' slides';
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
