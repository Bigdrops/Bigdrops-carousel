<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>300K-400K Minimal Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,400;1,700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --canvas-width:1080px;
  --canvas-height:1920px;
  --pad-top:280px;
  --pad-left:80px;
  --pad-right:180px;
  --content-max-h:960px;
  --bg:#000000;
  --text:#FFFFFF;
  --text2:#999999;
  --accent:#00E5FF;
}
html,body{width:100%;background:#111;font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}
body{overflow-y:auto;overflow-x:hidden;}

/* Toolbar */
.toolbar{
  position:fixed;bottom:0;left:0;right:0;z-index:9999;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;height:44px;
  background:rgba(0,0,0,.85);border-top:1px solid rgba(255,255,255,.1);
}
.tb-title{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,.5);text-transform:uppercase;}
.tb-controls{display:flex;align-items:center;gap:8px;}
.tbtn{
  padding:4px 12px;border:1px solid rgba(255,255,255,.2);
  background:transparent;color:rgba(255,255,255,.7);cursor:pointer;
  border-radius:2px;font-size:10px;font-family:'DM Sans',sans-serif;
  letter-spacing:1px;transition:all .15s;text-transform:uppercase;
}
.tbtn:hover{border-color:var(--accent);color:var(--accent);}
.tbtn.active{background:var(--accent);color:#000;border-color:var(--accent);}
#progressWrap{display:none;align-items:center;gap:8px;margin-left:8px;}
#progressWrap.visible{display:flex;}
#progressBar{
  width:120px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;
}
#progressFill{height:100%;width:0%;background:var(--accent);border-radius:2px;transition:width .3s;}
#progressLabel{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.5);min-width:40px;text-align:right;}

/* Slides wrapper */
.slides-wrapper{
  display:flex;flex-direction:column;align-items:center;
  padding-bottom:44px;
}
.slide-frame{
  width:var(--canvas-width);height:var(--canvas-height);
  position:relative;overflow:hidden;background:var(--bg);flex-shrink:0;
}
.slide-frame::after{
  content:"";position:absolute;bottom:0;left:0;
  width:1080px;height:680px;
  background:transparent;pointer-events:none;z-index:200;
}

/* Safe Content Zone */
.safe-content-zone{
  position:absolute;
  top:var(--pad-top);left:var(--pad-left);
  width:calc(var(--canvas-width) - var(--pad-left) - var(--pad-right));
  max-height:var(--content-max-h);
  display:flex;flex-direction:column;
  z-index:100;
}

/* Image Container */
.img-container{
  max-width:500px;width:100%;margin:0 auto 12px;flex-shrink:0;
}
.img-container img{width:100%;height:auto;object-fit:contain;display:block;}
.img-fallback{
  display:none;width:100%;padding:60px 20px;
  align-items:center;justify-content:center;flex-direction:column;gap:4px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);
}
.img-fallback span{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:500;color:#666;}
.img-fallback small{font-family:'DM Mono',monospace;font-size:9px;color:#555;text-transform:uppercase;letter-spacing:2px;}

/* Rank & Name */
.rank{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;font-weight:400;color:var(--accent);line-height:1;letter-spacing:2px;margin-bottom:2px;
}
.device-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:40px;font-weight:400;color:var(--text);line-height:1;margin-bottom:14px;letter-spacing:1px;
}

/* Spec Table */
.spec-table{display:flex;flex-direction:column;margin-bottom:12px;}
.spec-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:1px solid rgba(255,255,255,.08);
}
.spec-row:last-child{border-bottom:none;}
.spec-label{font-size:11px;color:var(--text2);font-weight:400;font-family:'DM Sans',sans-serif;text-transform:uppercase;letter-spacing:1px;}
.spec-value{
  font-size:11px;color:var(--text);font-weight:400;
  font-family:'DM Mono',monospace;text-align:right;max-width:55%;
}

/* Verdict Pull-quote */
.verdict{
  font-size:14px;font-weight:400;font-style:italic;
  color:var(--text);line-height:1.4;padding:10px 0 10px 16px;
  border-left:3px solid var(--accent);font-family:'DM Sans',sans-serif;
  margin-top:auto;
}

/* Swipe Text */
.swipe-text{
  position:absolute;bottom:16px;right:16px;
  font-family:'DM Sans',sans-serif;font-size:13px;letter-spacing:4px;
  opacity:.5;color:var(--text);z-index:150;text-transform:uppercase;
}

/* Cover Slide */
.cover-slide .safe-content-zone{justify-content:center;align-items:center;text-align:center;}
.cover-hook{
  font-family:'Bebas Neue',sans-serif;font-size:64px;font-weight:400;
  line-height:1;color:var(--text);letter-spacing:1px;
}
.cover-hook span{color:var(--accent);}
.cover-line{margin:6px 0;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text2);letter-spacing:3px;text-transform:uppercase;}
.cover-sub{
  font-family:'DM Sans',sans-serif;font-size:24px;font-weight:300;
  color:var(--text2);margin-top:12px;letter-spacing:1px;
}
.cover-rule{width:60px;height:3px;background:var(--accent);margin:20px auto 0;}

/* Closing Slide */
.closing-slide .safe-content-zone{justify-content:center;align-items:center;text-align:center;}
.closing-text{
  font-family:'Bebas Neue',sans-serif;font-size:56px;font-weight:400;
  line-height:1;color:var(--text);letter-spacing:1px;
}
.closing-text span{color:var(--accent);}
.closing-sub{
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;
  color:var(--text2);margin-top:16px;letter-spacing:3px;text-transform:uppercase;
}

/* Safe Zone Overlay */
.sz-overlay{display:none;position:absolute;inset:0;pointer-events:none;z-index:300;}
body.safe-on .sz-overlay{display:block;}
.sz-overlay::before{
  content:"";position:absolute;top:var(--pad-top);left:var(--pad-left);
  width:calc(var(--canvas-width) - var(--pad-left) - var(--pad-right));
  height:960px;border:2px dashed cyan;pointer-events:none;
}

/* Scrollbar */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:#111;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px;}
</style>
</head>
<body>

<div class="toolbar">
  <div class="tb-title">MINIMAL EDITION</div>
  <div class="tb-controls">
    <button class="tbtn" id="safeToggle">SAFE ZONE</button>
    <button class="tbtn" id="exportSingle">DL SLIDE</button>
    <button class="tbtn" id="exportAll">BATCH DL</button>
    <div id="progressWrap">
      <div id="progressBar"><div id="progressFill"></div></div>
      <span id="progressLabel">0/20</span>
    </div>
  </div>
</div>

<div class="slides-wrapper" id="slidesWrapper"></div>

<script>
const IMG_BASE='https://raw.githubusercontent.com/Bigdrops/Bigdrops-carousel/main/Phones/Three-400k/';

const phones=[
  {name:'Xiaomi 14',img:'mi14.jpg',specs:[
    ['Chip','SD 8 Gen 3'],['Display','6.36" LTPO 120Hz'],['Gaming','PUBGM 120fps'],['Camera','4K Selfie Leica'],['Battery','4,610mAh 90W'],['Software','Android 19']
  ],verdict:'Snapdragon 8 Gen 3. LTPO display. 120W charging. Three wins in one phone.'},
  {name:'Redmi Turbo 4 Pro',img:'turbo4pro.jpg',specs:[
    ['Chip','SD 8s Gen 3'],['Display','6.67" AMOLED 144Hz'],['Gaming','PUBGM 120fps'],['Camera','50MP OIS'],['Battery','6,000mAh 90W'],['Software','Android 18']
  ],verdict:'6,000mAh changes how you use a phone. Everything else is secondary.'},
  {name:'Vivo X100',img:'vivox100.jpg',specs:[
    ['Chip','Dimensity 9300'],['Display','6.78" AMOLED 120Hz'],['Gaming','PUBGM 120fps'],['Camera','Zeiss Periscope 5x'],['Battery','5,000mAh 120W'],['Software','Android 17']
  ],verdict:'Dimensity 9300 brute force. Zeiss periscope zoom. Selfie could be sharper.'},
  {name:'Honor Magic 5 Pro',img:'magic5pro.jpg',specs:[
    ['Chip','SD 8 Gen 2'],['Display','6.81" LTPO OLED 120Hz'],['Gaming','PUBGM 120fps'],['Camera','Dual eSIM 4K Selfie'],['Battery','5,100mAh 66W'],['Software','Android 17']
  ],verdict:'Dual eSIM travelers pick. 4K selfie. PWM dimming. Quietly unbeatable.'},
  {name:'Xiaomi 13 Pro',img:'mi13pro.jpg',specs:[
    ['Chip','SD 8 Gen 2'],['Display','6.73" LTPO 120Hz'],['Gaming','PUBGM 120fps'],['Camera','1-inch IMX989 Leica'],['Battery','4,820mAh 120W'],['Software','End of cycle']
  ],verdict:'IMX989 one-inch Leica sensor. 120W charging. 1080p selfie holds it back.'},
  {name:'OnePlus 11',img:'oneplus11.jpg',specs:[
    ['Chip','SD 8 Gen 2'],['Display','6.7" LTPO 120Hz'],['Gaming','PUBGM 90fps'],['Camera','Hasselblad'],['Battery','5,000mAh 100W'],['Software','Android 17']
  ],verdict:'Hasselblad portraits. 100W warp charge. Zero bloat. Just works.'},
  {name:'Samsung S23',img:'s23.jpg',specs:[
    ['Chip','SD 8 Gen 2 Galaxy'],['Display','6.1" AMOLED 120Hz'],['Gaming','PUBGM 120fps'],['Camera','eSIM 50MP'],['Battery','3,900mAh 25W'],['Software','Android 18']
  ],verdict:'Small screen lovers only. 25W charging means you plan ahead. Always.'},
  {name:'Vivo X90 Pro',img:'vivox90pro.jpg',specs:[
    ['Chip','Dimensity 9200'],['Display','6.78" AMOLED 120Hz'],['Gaming','PUBGM 90fps'],['Camera','1-inch IMX989 Zeiss V2'],['Battery','4,870mAh 120W'],['Software','End of cycle']
  ],verdict:'IMX989 with Zeiss V2 ISP. Night mode is unreal. Selfie is forgettable.'},
  {name:'Xiaomi 13',img:'mi13.jpg',specs:[
    ['Chip','SD 8 Gen 2'],['Display','6.36" AMOLED 120Hz'],['Gaming','PUBGM 120fps'],['Camera','Leica 54MP'],['Battery','4,500mAh 67W'],['Software','End of cycle']
  ],verdict:'SD 8 Gen 2 in a flat compact body. Balanced. Capable. Nothing special.'},
  {name:'Google Pixel 8',img:'pixel8.jpg',specs:[
    ['Chip','Tensor G3'],['Display','6.2" OLED 120Hz'],['Gaming','PUBGM Smooth'],['Camera','Best Selfie'],['Battery','4,575mAh 27W'],['Software','Android 22']
  ],verdict:'Tensor G3 runs cool. Seven years of updates. 27W charging is the catch.'},
  {name:'iQOO Neo 9',img:'iqooneo9.jpg',specs:[
    ['Chip','SD 8 Gen 2'],['Display','6.78" AMOLED 144Hz'],['Gaming','PUBGM 120fps'],['Camera','120W Charging'],['Battery','5,160mAh 120W'],['Software','Android 17']
  ],verdict:'120W charging in fifteen minutes. SD 8 Gen 2. CN ROM quirks accepted.'},
  {name:'Redmi K70',img:'redmik70.jpg',specs:[
    ['Chip','SD 8 Gen 2'],['Display','6.67" AMOLED 144Hz'],['Gaming','PUBGM 90fps'],['Camera','GG Victus'],['Battery','5,000mAh 90W'],['Software','Android 17']
  ],verdict:'Gorilla Glass Victus. SD 8 Gen 2. Best hard value in this bracket.'},
  {name:'Oppo Find X6',img:'findx6.jpg',specs:[
    ['Chip','Dimensity 9200'],['Display','6.74" LTPO 120Hz'],['Gaming','PUBGM 90fps'],['Camera','Hasselblad'],['Battery','5,000mAh 80W'],['Software','End of cycle']
  ],verdict:'Hasselblad colors look expensive. Price is expensive too. Hard sell.'},
  {name:'Redmi K60 Pro',img:'redmik60pro.jpg',specs:[
    ['Chip','SD 8 Gen 2'],['Display','6.67" AMOLED 120Hz'],['Gaming','PUBGM 90fps'],['Camera','Average'],['Battery','5,500mAh 67W'],['Software','End of cycle']
  ],verdict:'5,500mAh lasts forever. Everything else feels last year. K70 wins.'},
  {name:'Xiaomi 12S Ultra',img:'mi12sultra.jpg',specs:[
    ['Chip','SD 8+ Gen 1'],['Display','6.73" LTPO 120Hz'],['Gaming','PUBGM 90fps'],['Camera','1-inch IMX989 Leica'],['Battery','4,860mAh 67W'],['Software','End of cycle']
  ],verdict:'IMX989 one-inch Leica. Best camera of 2022. Everything else has aged.'},
  {name:'Xiaomi 14T',img:'mi14t.jpg',specs:[
    ['Chip','Dimensity 8300-Ultra'],['Display','6.67" AMOLED 144Hz'],['Gaming','PUBGM 90fps'],['Camera','Dual eSIM 4K Selfie'],['Battery','5,000mAh 67W'],['Software','Android 18']
  ],verdict:'Dual eSIM. 4K Leica selfie. Dimensity 8300 is outmatched here.'},
  {name:'ROG 6D Ultimate',img:'rog6dultimate.jpg',specs:[
    ['Chip','Dimensity 9000+'],['Display','6.78" AMOLED 165Hz'],['Gaming','PUBGM 120fps'],['Camera','18GB RAM'],['Battery','6,000mAh 65W'],['Software','End of cycle']
  ],verdict:'165Hz gaming. 18GB RAM. Air triggers. Not for everyday carry.'},
  {name:'ROG Phone 6D',img:'rog6d.jpg',specs:[
    ['Chip','Dimensity 9000+'],['Display','6.78" AMOLED 165Hz'],['Gaming','PUBGM 120fps'],['Camera','12GB RAM'],['Battery','6,000mAh 65W'],['Software','End of cycle']
  ],verdict:'Same chip as Ultimate. Less RAM. Less cooling. Pay up for a reason.'}
];

function buildSlides(){
  var w=document.getElementById('slidesWrapper');
  var h='';

  // Cover
  h+='<div class="slide-frame cover-slide"><div class="safe-content-zone"><div class="cover-hook">STOP SCROLLING.<br><span>START COMPARING.</span></div><div class="cover-line">18 PHONES &middot; N300K TO N400K</div><div class="cover-sub">No distractions. The specs decide. Not the hype.</div><div class="cover-rule"></div><div class="swipe-text">SWIPE</div></div><div class="sz-overlay"></div></div>';

  // Phones 2-19
  phones.forEach(function(p,i){
    var n=String(i+1).padStart(2,'0');
    var rows='';
    p.specs.forEach(function(s){
      rows+='<div class="spec-row"><span class="spec-label">'+s[0]+'</span><span class="spec-value">'+s[1]+'</span></div>';
    });
    h+='<div class="slide-frame"><div class="safe-content-zone"><div class="img-container"><img src="'+IMG_BASE+p.img+'" alt="'+p.name+'" crossorigin="anonymous" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';"><div class="img-fallback"><span>'+p.name+'</span><small>MISSING ASSET</small></div></div><div class="rank">#'+n+'</div><div class="device-name">'+p.name+'</div><div class="spec-table">'+rows+'</div><div class="verdict">'+p.verdict+'</div><div class="swipe-text">SWIPE</div></div><div class="sz-overlay"></div></div>';
  });

  // Closing
  h+='<div class="slide-frame closing-slide"><div class="safe-content-zone"><div class="closing-text">YOU ALREADY KNOW<br><span>WHICH ONE.</span></div><div class="closing-sub">Don\'t let pride cost you N100K extra.</div><div class="closing-sub" style="margin-top:8px;opacity:.6;">Wrong answers only in the comments.</div><div class="cover-rule"></div><div class="closing-sub" style="margin-top:20px;">N400K TO N500K. SOON.</div><div class="swipe-text">SWIPE</div></div><div class="sz-overlay"></div></div>';

  w.innerHTML=h;
}

function getCurrentSlideIndex(){
  return Math.round(window.scrollY/1920);
}

function getCurrentSlide(){
  var idx=getCurrentSlideIndex();
  return document.querySelectorAll('.slide-frame')[idx]||null;
}

function updateProgress(cur,total){
  var p=document.getElementById('progressFill');
  var l=document.getElementById('progressLabel');
  if(p&&l){
    p.style.width=(cur/total*100)+'%';
    l.textContent=cur+'/'+total;
  }
}

document.addEventListener('DOMContentLoaded',function(){
  buildSlides();

  // Safe zone toggle
  var safeOn=false;
  document.getElementById('safeToggle').addEventListener('click',function(){
    safeOn=!safeOn;
    this.classList.toggle('active');
    document.body.classList.toggle('safe-on',safeOn);
  });

  // Single export
  document.getElementById('exportSingle').addEventListener('click',function(){
    var slide=getCurrentSlide();
    if(!slide||typeof html2canvas==='undefined')return;
    var idx=getCurrentSlideIndex();
    var n=String(idx+1).padStart(2,'0');
    html2canvas(slide,{scale:3,useCORS:true,backgroundColor:'#000000',logging:false}).then(function(c){
      var a=document.createElement('a');
      a.download='BIGDROPS-300k-400k-minimal-'+n+'.png';
      a.href=c.toDataURL();
      a.click();
    });
  });

  // Batch export
  document.getElementById('exportAll').addEventListener('click',function(){
    var slides=document.querySelectorAll('.slide-frame');
    var total=slides.length;
    var pw=document.getElementById('progressWrap');
    pw.classList.add('visible');
    updateProgress(0,total);

    function captureNext(i){
      if(i>=total){
        setTimeout(function(){pw.classList.remove('visible');},1500);
        return;
      }
      slides[i].scrollIntoView({behavior:'instant'});
      setTimeout(function(){
        html2canvas(slides[i],{scale:3,useCORS:true,backgroundColor:'#000000',logging:false}).then(function(c){
          var n=String(i+1).padStart(2,'0');
          var a=document.createElement('a');
          a.download='BIGDROPS-300k-400k-minimal-'+n+'.png';
          a.href=c.toDataURL();
          a.click();
          updateProgress(i+1,total);
          setTimeout(function(){captureNext(i+1);},400);
        });
      },800);
    }
    captureNext(0);
  });
});
</script>
</body>
</html>
